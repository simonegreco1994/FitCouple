<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FitCouple 💪</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap');
:root{
  --accent:#e8ff47;--accent2:#60a5fa;--green:#4ade80;
  --red:#ff6b6b;--orange:#f59e0b;
  --bg:#0a0a14;--card:#12121e;--border:#2a2a3e;--muted:#888;--sub:#1a1a2e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'DM Sans',system-ui,sans-serif}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;padding:20px 16px}
/* LOADER */
#screen-loader{background:var(--bg);justify-content:center;align-items:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.header-user{display:flex;align-items:center;gap:10px}
.header-name{font-weight:800;font-size:15px;color:var(--accent)}
.header-sub{font-size:11px;color:var(--muted)}
.btn-logout{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit}
/* NAV */
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;color:#555;cursor:pointer;font-family:inherit;transition:color .2s;gap:3px}
.nav-btn.active{color:var(--accent)}
.nav-btn span:first-child{font-size:20px}
.nav-btn span:last-child{font-size:11px}
/* AUTH */
#screen-auth{background:var(--bg);justify-content:center;align-items:center;padding:24px;overflow-y:auto}
.auth-card{width:100%;max-width:380px;background:var(--card);border-radius:24px;padding:28px;border:1px solid var(--border)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .logo-icon{font-size:48px;display:block}
.auth-logo h1{font-size:30px;font-weight:900;color:var(--accent);letter-spacing:-1px;margin:8px 0 4px}
.auth-logo p{color:var(--muted);font-size:14px}
.auth-error{color:var(--red);font-size:13px;margin-bottom:12px;text-align:center;padding:8px 12px;background:rgba(255,107,107,.1);border-radius:8px}
.toggle-group{display:flex;background:var(--sub);border-radius:12px;padding:4px;margin-bottom:20px}
.toggle-btn{flex:1;padding:9px 0;border:none;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#0a0a14}
.form-group{margin-bottom:14px}
.form-label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=date]{
  width:100%;max-width:100%;background:var(--sub);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;box-sizing:border-box}
input:focus{border-color:var(--accent)}
.avatar-picker{display:flex;gap:8px;flex-wrap:wrap}
.avatar-opt{font-size:24px;background:var(--sub);border:2px solid var(--border);border-radius:10px;width:44px;height:44px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.avatar-opt.selected{border-color:var(--accent);background:rgba(232,255,71,.1)}
/* BUTTONS */
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#0a0a14;border:none;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-add{background:var(--accent);color:#0a0a14;border:none;border-radius:10px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-icon{background:var(--sub);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:16px}
.btn-icon.danger{background:#3a1a1a}
.btn-icon.success{background:#1a3a1a}
.btn-back{background:var(--sub);color:var(--muted);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-family:inherit}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit;width:100%;margin-bottom:10px}
/* CARDS */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:20px;font-weight:800;color:#fff}
.card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.card-row{display:flex;align-items:center;gap:12px}
.card-title{font-weight:700;font-size:15px;color:#fff;margin-bottom:3px}
.card-sub{font-size:12px;color:var(--muted)}
.card-actions{display:flex;gap:8px;flex-shrink:0}
.empty{color:#555;text-align:center;margin-top:50px;font-size:14px}
.progress-track{height:6px;background:var(--sub);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.macro-row{margin-bottom:10px}
.macro-label-row{display:flex;justify-content:space-between;margin-bottom:4px}
.macro-label{color:var(--muted);font-size:12px}
.macro-val{font-size:12px;font-weight:700}
/* EDITOR */
.ex-card{background:var(--sub);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.ex-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:10px}
.ex-grid input{border-radius:8px;padding:8px 10px;font-size:13px}
/* LIVE */
#screen-live{background:var(--bg)}
.live-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.live-progress{height:4px;background:var(--sub);flex-shrink:0}
.live-progress-fill{height:100%;background:var(--accent);transition:width .4s}
.live-content{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.live-ex-card{background:var(--card);border-radius:20px;padding:24px;text-align:center;border:1px solid var(--border)}
.live-ex-label{color:var(--muted);font-size:13px;margin-bottom:8px}
.live-ex-name{font-size:22px;font-weight:900;color:#fff;margin-bottom:20px}
.live-stats{display:flex;justify-content:center;gap:28px}
.live-stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;margin-bottom:4px}
.live-stat-val{color:var(--accent);font-size:22px;font-weight:900}
.rest-card{background:#0d1f0d;border-radius:20px;padding:24px;text-align:center;border:1px solid #1a3a1a}
.rest-label{color:var(--green);font-size:13px;margin-bottom:8px}
.rest-timer{font-size:68px;font-weight:900;color:var(--green);line-height:1;margin-bottom:16px;font-variant-numeric:tabular-nums}
.rest-controls{justify-content:center;margin-bottom:14px}
.rest-edit{text-align:center}
.rest-edit label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
.rest-edit input{width:90px;text-align:center}
.btn-skip{background:#1a3a1a;color:var(--green);border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-complete{background:var(--accent);color:#0a0a14;border:none;border-radius:16px;padding:20px;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s}
.btn-complete:active{opacity:.85}
.live-list{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border)}
.live-list-title{color:var(--muted);font-size:12px;margin-bottom:10px}
.live-ex-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--sub)}
.live-ex-row:last-child{border-bottom:none}
.live-ex-row .ex-name{flex:1;font-size:13px}
.live-ex-row .ex-detail{color:#555;font-size:11px}
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px;text-align:center}
.done-screen .trophy{font-size:88px}
.done-screen h2{color:var(--accent);font-size:28px;font-weight:900}
/* GROUP PILLS */
.group-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.group-pill{padding:5px 12px;border-radius:20px;background:var(--sub);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.group-pill.active{background:var(--accent);color:#0a0a14;border-color:var(--accent)}
/* EXERCISE PICKER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.modal-inner{background:var(--bg);border-radius:20px 20px 0 0;margin-top:auto;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;color:#fff}
.modal-close{background:var(--sub);border:none;border-radius:8px;color:var(--muted);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:13px}
.modal-scroll{flex:1;overflow-y:auto;padding:16px}
.ex-db-card{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:12px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.ex-db-card:active{border-color:var(--accent)}
.ex-db-img{width:60px;height:60px;border-radius:8px;object-fit:cover;background:var(--sub);flex-shrink:0}
.ex-db-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.ex-db-meta{font-size:11px;color:var(--muted)}
.ex-detail-img{width:100%;border-radius:12px;margin-bottom:14px;background:var(--sub);min-height:200px;object-fit:cover}
/* FOOD */
.food-result{cursor:pointer;transition:border-color .15s}
.food-result.selected{border-color:var(--accent);background:rgba(232,255,71,.04)}
/* GOALS */
.goals-summary{background:var(--card);border-radius:16px;padding:16px;margin-top:20px;border:1px solid var(--border)}
.goals-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sub)}
.goals-row:last-child{border-bottom:none}
/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0a14;font-size:13px;font-weight:700;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <div id="screen-loader" class="screen active">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:14px">Connessione a Firebase…</p>
  </div>

  <div id="screen-auth" class="screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">💪</span>
        <h1>FitCouple</h1>
        <p>Il tuo compagno di allenamento</p>
      </div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-login" onclick="switchAuthMode('login')">Accedi</button>
        <button class="toggle-btn" id="btn-register" onclick="switchAuthMode('register')">Registrati</button>
      </div>
      <div id="auth-error" class="auth-error" style="display:none"></div>
      <div id="register-fields" style="display:none">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input type="text" id="reg-name" placeholder="Il tuo nome">
        </div>
        <div class="form-group">
          <label class="form-label">Avatar</label>
          <div class="avatar-picker" id="avatar-picker"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="auth-email" placeholder="email@esempio.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="auth-password" placeholder="minimo 6 caratteri">
      </div>
      <button class="btn-primary" id="auth-btn" onclick="authSubmit()">Entra</button>
      <p id="reset-link" style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted);cursor:pointer;display:none" onclick="sendReset()">
        Password dimenticata?
      </p>
    </div>
  </div>

  <div id="screen-main" class="screen" style="flex-direction:column">
    <div class="app-header">
      <div class="header-user">
        <span id="hdr-avatar" style="font-size:28px;line-height:1">💪</span>
        <div style="margin-left:10px">
          <div class="header-name" id="hdr-name">…</div>
          <div class="header-sub">FitCouple</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="version-indicator" style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted)"><span id="version-icon" style="font-size:16px">⏳</span><span id="version-text" style="font-weight:600">v1.5.0</span></span>
        <button class="btn-logout" onclick="logout()">Esci</button>
      </div>
    </div>
    <div id="tab-workouts" class="scroll-area" style="display:none"></div>
    <div id="tab-nutrition" class="scroll-area" style="display:none"></div>
    <div id="tab-program"   class="scroll-area" style="display:none"></div>
    <div id="tab-goals"     class="scroll-area" style="display:none"></div>
    <div id="tab-history"   class="scroll-area" style="display:none"></div>
    <div id="tab-profile"   class="scroll-area" style="display:none"></div>
    <nav class="bottom-nav">
      <button class="nav-btn" id="nav-program"   onclick="showTab('program')"><span>📅</span><span>Piano</span></button>
      <button class="nav-btn" id="nav-workouts" onclick="showTab('workouts')"><span>🏋️</span><span>Schede</span></button>
      <button class="nav-btn" id="nav-nutrition" onclick="showTab('nutrition')"><span>🥗</span><span>Diario</span></button>
      <button class="nav-btn" id="nav-history"   onclick="showTab('history')"><span>📋</span><span>Storico</span></button>
      <button class="nav-btn" id="nav-profile"   onclick="showTab('profile')"><span>👤</span><span>Profilo</span></button>
    </nav>
  </div>

  <div id="screen-live" class="screen"></div>

  <!-- FOOD QUANTITY MODAL -->
  <div id="food-qty-modal" style="display:none" class="modal-overlay" onclick="closeFoodQtyModal(event)">
    <div class="modal-inner" style="max-height:70dvh">
      <div class="modal-header">
        <span class="modal-title" id="fqm-title">Aggiungi alimento</span>
        <button class="modal-close" onclick="closeFoodQtyModalForce()">✕</button>
      </div>
      <div class="modal-scroll">
        <p id="fqm-meta" style="color:var(--muted);font-size:12px;margin-bottom:16px"></p>
        <div class="form-group">
          <label class="form-label">Quantità (g / ml)</label>
          <input type="number" id="fqm-qty" value="100" min="1"
            style="font-size:20px;font-weight:700;text-align:center"
            oninput="updateFoodQtyModal()">
        </div>
        <div id="fqm-preview" class="card" style="margin-bottom:16px"></div>
        <button class="btn-primary" onclick="confirmFoodQtyModal()">✅ Aggiungi al diario</button>
      </div>
    </div>
  </div>
  <!-- EXERCISE PICKER MODAL -->
  <div id="ex-modal" style="display:none" class="modal-overlay" onclick="closeExModal(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="modal-title">📚 Seleziona esercizio</span>
        <button class="modal-close" onclick="closeExModalForce()">✕ Chiudi</button>
      </div>
      <div class="modal-scroll">
        <input type="text" id="ex-search-inp" placeholder="🔍 Cerca esercizio…" oninput="filterExList(this.value)"
          style="width:100%;margin-bottom:12px;background:var(--sub);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none">
        <div class="group-pills" id="ex-group-pills" style="margin-bottom:14px"></div>
        <div id="ex-list"></div>
      </div>
    </div>
  </div>
  <!-- EXERCISE DETAIL MODAL -->
  <div id="ex-detail" style="display:none" class="modal-overlay" onclick="closeExDetail(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="modal-title" id="ex-detail-title">Esercizio</span>
        <button class="modal-close" onclick="closeExDetailForce()">✕</button>
      </div>
      <div class="modal-scroll">
        <img id="ex-detail-img" src="" class="ex-detail-img" alt="" onerror="this.style.display='none'">
        <p id="ex-detail-group" style="color:var(--accent);font-size:12px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px"></p>
        <p id="ex-detail-instr" style="color:#ccc;font-size:13px;line-height:1.7;margin-bottom:16px"></p>
        <button class="btn-primary" onclick="addExFromDB()">+ Aggiungi alla scheda</button>
      </div>
    </div>
  </div>
</div>
<div id="toast">✓ Salvato</div>

  {id:"Barbell_Bench_Press_-_Medium_Grip",name:"Barbell Bench Press - Medium Grip",group:"Petto",equipment:"Bilanciere",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Bench_Press_-_Medium_Grip/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Bench_Press_-_Medium_Grip/1.jpg",instructions:"Sdraiati sulla panca piana. Con una presa media, solleva il bilanciere dal rack e tienilo sopra il petto a braccia tese. Abbassa lentamente il bilanciere fino al petto, poi spingi verso l'alto fino alla posizione iniziale.",sets:3,reps:10,rest:90},
  {id:"Barbell_Incline_Bench_Press_-_Medium_Grip",name:"Barbell Incline Bench Press - Medium Grip",group:"Petto",equipment:"Bilanciere",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Incline_Bench_Press_-_Medium_Grip/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Incline_Bench_Press_-_Medium_Grip/1.jpg",instructions:"Sdraiati sulla panca inclinata a 30-45°. Afferra il bilanciere con presa media. Abbassa il bilanciere verso la parte alta del petto, poi spingi verso l'alto. Mantieni i gomiti a circa 75° dal busto.",sets:3,reps:10,rest:90},
  {id:"Dumbbell_Flyes",name:"Dumbbell Flyes",group:"Petto",equipment:"Manubri",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Flyes/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Flyes/1.jpg",instructions:"Sdraiati sulla panca piana con un manubrio in ogni mano. Con i gomiti leggermente piegati, abbassa le braccia ai lati in un ampio arco fino a sentire lo stretching del petto, poi riporta in alto.",sets:3,reps:10,rest:90},
  {id:"Cable_Crossover",name:"Cable Crossover",group:"Petto",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Cable_Crossover/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Cable_Crossover/1.jpg",instructions:"In piedi al centro dei cavi alti. Afferra le impugnature e, con i gomiti leggermente piegati, porta le mani verso il basso e al centro incrociandole. Concentrati sulla contrazione del petto.",sets:3,reps:10,rest:90},
  {id:"Dumbbell_Bench_Press",name:"Dumbbell Bench Press",group:"Petto",equipment:"Manubri",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Bench_Press/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Bench_Press/1.jpg",instructions:"Sdraiati sulla panca con un manubrio in ogni mano all'altezza del petto. Spingi i manubri verso l'alto fino a estendere le braccia, poi abbassa lentamente al punto di partenza.",sets:3,reps:10,rest:90},
  {id:"Incline_Dumbbell_Flyes",name:"Incline Dumbbell Flyes",group:"Petto",equipment:"Manubri",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Incline_Dumbbell_Flyes/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Incline_Dumbbell_Flyes/1.jpg",instructions:"Sdraiati sulla panca inclinata con un manubrio per mano. Abbassa le braccia lateralmente in ampio arco sentendo lo stretching del petto alto, poi riporta in alto.",sets:3,reps:10,rest:90},
  {id:"Close-Grip_Barbell_Bench_Press",name:"Close-Grip Barbell Bench Press",group:"Tricipiti",equipment:"Bilanciere",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Close-Grip_Barbell_Bench_Press/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Close-Grip_Barbell_Bench_Press/1.jpg",instructions:"Come la panca piana ma con presa stretta (spalle larghezza). Abbassa il bilanciere verso il petto basso, mantieni i gomiti vicini al corpo per lavorare i tricipiti.",sets:3,reps:10,rest:90},
  {id:"Wide-Grip_Lat_Pulldown",name:"Wide-Grip Lat Pulldown",group:"Dorsali",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Wide-Grip_Lat_Pulldown/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Wide-Grip_Lat_Pulldown/1.jpg",instructions:"Siediti alla lat machine. Afferra la barra con presa larga, sopra la testa. Tira la barra verso il petto tenendo il busto leggermente inclinato, poi risali lentamente.",sets:3,reps:10,rest:90},
  {id:"Seated_Cable_Rows",name:"Seated Cable Rows",group:"Schiena",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Seated_Cable_Rows/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Seated_Cable_Rows/1.jpg",instructions:"Siediti al pulley basso con i piedi sui supporti. Tira il cavo verso l'addome tenendo la schiena dritta, stringendo le scapole. Ritorna lentamente alla posizione iniziale.",sets:3,reps:10,rest:90},
  {id:"Bent_Over_Barbell_Row",name:"Bent Over Barbell Row",group:"Schiena",equipment:"Bilanciere",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Bent_Over_Barbell_Row/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Bent_Over_Barbell_Row/1.jpg",instructions:"In piedi con il bilanciere, busto inclinato a 45°, schiena dritta. Tira il bilanciere verso l'addome basso stringendo le scapole. Abbassa lentamente e ripeti.",sets:3,reps:10,rest:90},
  {id:"One-Arm_Dumbbell_Row",name:"One-Arm Dumbbell Row",group:"Schiena",equipment:"Manubri",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/One-Arm_Dumbbell_Row/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/One-Arm_Dumbbell_Row/1.jpg",instructions:"Appoggiate un ginocchio e la mano sulla panca. Con l'altra mano tira il manubrio verso il fianco, tenendo il gomito vicino al corpo. Abbassa lentamente.",sets:3,reps:10,rest:90},
  {id:"Underhand_Cable_Pulldowns",name:"Underhand Cable Pulldowns",group:"Dorsali",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Underhand_Cable_Pulldowns/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Underhand_Cable_Pulldowns/1.jpg",instructions:"Come il lat pulldown ma con presa supina (palmi verso di te) alla larghezza delle spalle. Tira verso il petto, ottimo per i dorsali e bicipiti.",sets:3,reps:10,rest:90},
  {id:"Straight-Arm_Pulldown",name:"Straight-Arm Pulldown",group:"Dorsali",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Straight-Arm_Pulldown/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Straight-Arm_Pulldown/1.jpg",instructions:"In piedi davanti al cavo alto. Con le braccia quasi tese, abbassa la barra fino ai fianchi descrivendo un arco, poi risali lentamente. Mantieni il core attivo.",sets:3,reps:10,rest:90},

  {id:"Dumbbell_Shoulder_Press",name:"Dumbbell Shoulder Press",group:"Spalle",equipment:"Manubri",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Shoulder_Press/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Shoulder_Press/1.jpg",instructions:"Seduto con i manubri all'altezza delle orecchie. Spingi i manubri verso l'alto fino a quasi toccarli in cima, poi abbassa lentamente. Tieni il core attivo.",sets:3,reps:10,rest:90},
  {id:"Arnold_Dumbbell_Press",name:"Arnold Dumbbell Press",group:"Spalle",equipment:"Manubri",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Arnold_Dumbbell_Press/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Arnold_Dumbbell_Press/1.jpg",instructions:"Parti con i manubri davanti a te, palmi verso di te. Ruota i polsi verso l'esterno mentre spingi verso l'alto. Abbassa ruotando i polsi verso l'interno. Ottimo per le spalle complete.",sets:3,reps:10,rest:90},
  {id:"Cable_Seated_Lateral_Raise",name:"Cable Seated Lateral Raise",group:"Spalle",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Cable_Seated_Lateral_Raise/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Cable_Seated_Lateral_Raise/1.jpg",instructions:"Seduto di fianco al cavo basso. Alza il braccio lateralmente fino all'altezza della spalla, poi abbassa lentamente. Mantieni il gomito leggermente piegato.",sets:3,reps:10,rest:90},

  {id:"Face_Pull",name:"Face Pull",group:"Spalle",equipment:"Cavo",img0:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Face_Pull/0.jpg",img1:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Face_Pull/1.jpg",instructions:"Al cavo alto con corda. Tira verso il viso tenendo i gomiti alti, separando le mani. Ottimo per i deltoidi posteriori e la salute delle spalle.",sets:3,reps:10,rest:90},

const AVATARS=["🦁","🐯","🐺","🦊","🐻","🦋","🌸","⚡","🔥","🎯"];

// ─── STATE ────────────────────────────────────────────────────────────────────
let CU=null, profile=null, workouts=[], unsubW=null;
let nutritionDate=todayStr();
let liveState=null, liveTimer=null;
let selectedFood=null, selAvatar="🦁", authMode="login", editingWkt=null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function r1(n){return Math.round(n*10)/10}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function showScreen(n){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById("screen-"+n).classList.add("active")}
function toast(msg="✓ Salvato"){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000)}

// ─── AVATAR PICKER INIT ──────────────────────────────────────────────────────
const picker=document.getElementById("avatar-picker");
AVATARS.forEach(a=>{
  const b=document.createElement("button");
  b.className="avatar-opt"+(a===selAvatar?" selected":"");
  b.textContent=a;
  b.onclick=()=>{selAvatar=a;document.querySelectorAll(".avatar-opt").forEach(x=>x.classList.remove("selected"));b.classList.add("selected")};
  picker.appendChild(b);
});

// ─── AUTH STATE ───────────────────────────────────────────────────────────────
onAuthStateChanged(auth,async user=>{
  if(user){
    CU=user;
    const snap=await getDoc(doc(db,"users",CU.uid));
    profile=snap.exists()?snap.data():{name:CU.email,avatar:"💪",goals:{kcal:2000,protein:150,carbs:200,fat:65}};
    document.getElementById("hdr-avatar").textContent=profile.avatar||"💪";
    document.getElementById("hdr-name").textContent=profile.name||CU.email;
    subscribeWorkouts();
    subscribeRecipes();
    subscribeCustomFoods();
    autoPublishIfNewer();
    setTimeout(checkAppVersion, 1500);
    subscribeVersion();
    showScreen("main");
    showTab("program");
  }else{
    CU=null;profile=null;
    if(unsubW){unsubW();unsubW=null}
    showScreen("auth");
  }
});

// ─── AUTH FUNCTIONS ───────────────────────────────────────────────────────────
function switchAuthMode(m){
  authMode=m;
  document.getElementById("btn-login").classList.toggle("active",m==="login");
  document.getElementById("btn-register").classList.toggle("active",m==="register");
  document.getElementById("register-fields").style.display=m==="register"?"block":"none";
  document.getElementById("auth-btn").textContent=m==="login"?"Entra":"Crea profilo";
  document.getElementById("reset-link").style.display=m==="login"?"block":"none";
  document.getElementById("auth-error").style.display="none";
}
window.switchAuthMode=switchAuthMode;

function showAuthErr(msg){const e=document.getElementById("auth-error");e.textContent=msg;e.style.display="block"}

async function authSubmit(){
  const email=document.getElementById("auth-email").value.trim();
  const pwd=document.getElementById("auth-password").value;
  const btn=document.getElementById("auth-btn");
  btn.disabled=true;btn.textContent="…";
  try{
    if(authMode==="login"){
      await signInWithEmailAndPassword(auth,email,pwd);
    }else{
      const name=document.getElementById("reg-name").value.trim();
      if(!name){showAuthErr("Inserisci il tuo nome.");btn.disabled=false;btn.textContent="Crea profilo";return}
      const cred=await createUserWithEmailAndPassword(auth,email,pwd);
      await setDoc(doc(db,"users",cred.user.uid),{name,avatar:selAvatar,goals:{kcal:2000,protein:150,carbs:200,fat:65}});
    }
  }catch(e){
    const msgs={"auth/invalid-credential":"Email o password errati.","auth/email-already-in-use":"Email già registrata.","auth/weak-password":"Password troppo corta (min 6).","auth/invalid-email":"Email non valida."};
    showAuthErr(msgs[e.code]||e.message);
    btn.disabled=false;btn.textContent=authMode==="login"?"Entra":"Crea profilo";
  }
}
window.authSubmit=authSubmit;

async function sendReset(){
  const email=document.getElementById("auth-email").value.trim();
  if(!email){showAuthErr("Inserisci prima la tua email.");return}
  await sendPasswordResetEmail(auth,email);
  showAuthErr("✉️ Email di reset inviata!");
}
window.sendReset=sendReset;

async function logout(){await signOut(auth)}
window.logout=logout;

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(tab){
  ["program","workouts","nutrition","history","profile"].forEach(t=>{
    document.getElementById("tab-"+t).style.display=t===tab?"block":"none";
    document.getElementById("nav-"+t).classList.toggle("active",t===tab);
  });
  // Also hide goals tab if visible
  const gt=document.getElementById("tab-goals");
  if(gt) gt.style.display="none";
  if(tab==="workouts")renderWorkoutsTab();
  else if(tab==="nutrition"){
    renderNutritionTab();
    // Setup diary realtime for current date
    subscribeDiary();
  }
  else if(tab==="goals"){document.getElementById("tab-goals").style.display="block";renderGoalsTab();}
  else if(tab==="history")renderHistoryTab();
  else if(tab==="profile")renderProfileTab();
  else if(tab==="program")renderProgramTab();
}
window.showTab=showTab;

// ─── WORKOUTS (realtime) ──────────────────────────────────────────────────────
function subscribeWorkouts(){
  const q=query(collection(db,"workouts"),where("uid","==",CU.uid));
  unsubW=onSnapshot(q,snap=>{
    workouts=snap.docs.map(d=>({id:d.id,...d.data()}));
    const tab=document.getElementById("tab-workouts");
    if(tab&&tab.style.display!=="none")renderWorkoutsTab();
  });
}

let unsubVersion=null;
function subscribeVersion(){
  // Listen for version changes - notify if server has newer version
  unsubVersion=onSnapshot(doc(db,"appMeta","version"),snap=>{
    if(!snap.exists()) return;
    const serverVer=snap.data().version;
    if(serverVer && serverVer!==APP_VERSION){
      updateVersionIndicator(false);
      showUpdatePopup(serverVer);
    } else {
      updateVersionIndicator(true);
      hideUpdatePopup();
    }
  });
}

let unsubRecipes=null;
function subscribeRecipes(){
  if(unsubRecipes){unsubRecipes();unsubRecipes=null;}
  unsubRecipes=onSnapshot(collection(db,"recipes"),snap=>{
    window._sharedRecipes=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Refresh recipes list if visible
    const recList=document.getElementById("recipes-list");
    if(recList&&document.getElementById("ftab-r")?.classList.contains("active")){
      renderRecipesList();
    }
  });
}

let unsubCustomFoods=null;
function subscribeCustomFoods(){
  if(unsubCustomFoods){unsubCustomFoods();unsubCustomFoods=null;}
  unsubCustomFoods=onSnapshot(doc(db,"customFoods","shared"),snap=>{
    _customFoods=snap.exists()?(snap.data().foods||[]):[];
  });
}

async function saveWktToDB(w){
  const {id,...data}=w; data.uid=CU.uid;
  if(workouts.find(x=>x.id===id))await setDoc(doc(db,"workouts",id),data);
  else await addDoc(collection(db,"workouts"),data);
  toast("✓ Scheda salvata");
}

async function delWktFromDB(id){await deleteDoc(doc(db,"workouts",id));toast("🗑 Scheda eliminata")}

function renderWorkoutsTab(){
  const el=document.getElementById("tab-workouts");
  let h=`<div class="section-header"><h2 class="section-title">Le tue schede</h2><button class="btn-add" onclick="openWktEditor(null)">+ Nuova</button></div>`;
  if(!workouts.length)h+=`<p class="empty">Nessuna scheda. Creane una! 💪</p>`;
  else workouts.forEach(w=>{
    h+=`<div class="card"><div class="card-row">
      <div style="flex:1"><div class="card-title">${esc(w.name)||"Scheda senza nome"}</div>
      <div class="card-sub">${(w.exercises||[]).length} esercizi</div></div>
      <div class="card-actions">
        <button class="btn-icon" onclick="openWktEditor('${w.id}')">✏️</button>

// ─── LIVE WORKOUT ─────────────────────────────────────────────────────────────
function startLive(id){
  const w=workouts.find(w=>w.id===id);
  if(!w||(w.exercises||[]).length===0){alert("Aggiungi almeno un esercizio!");return}
  liveState={workout:JSON.parse(JSON.stringify(w)),exIdx:0,setIdx:0,phase:"work",timerLeft:0,customRest:null,done:false,startTime:Date.now(),weightChanges:{}};
  clearInterval(liveTimer);renderLive();showScreen("live");
}
window.startLive=startLive;

function renderLive(){
  const sc=document.getElementById("screen-live");
  if(liveState.done){
    const changes=liveState.pendingWeightUpdate||{};
    const changeKeys=Object.keys(changes);
    const duration=liveState.startTime?Math.round((Date.now()-liveState.startTime)/1000):0;
    const mins=Math.floor(duration/60), secs=duration%60;
    const durStr=mins>0?`${mins}min ${secs}s`:`${secs}s`;

    let weightPrompt="";
    if(changeKeys.length>0){
      const rows=changeKeys.map(i=>{
        const c=changes[i];
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--sub)">
          <span style="color:#ccc;font-size:13px">${esc(c.name)}</span>
          <span style="font-size:13px">
            <span style="color:#555;font-size:12px">${c.oldWeight?c.oldWeight+" kg":"non impostato"}</span>
            <span style="color:var(--accent);margin-left:6px;font-weight:700">→ ${c.newWeight||"—"} kg</span>
          </span>
        </div>`;
      }).join("");
      weightPrompt=`
        <div style="background:var(--card);border-radius:16px;padding:16px;width:100%;max-width:320px;border:1px solid var(--border);margin-top:4px">
          <p style="color:#fff;font-weight:700;margin-bottom:10px;font-size:14px">💾 Aggiornare i pesi nella scheda?</p>
          ${rows}
          <div style="display:flex;gap:10px;margin-top:14px">
            <button onclick="updateWorkoutWeights().then(endLive)"
              style="flex:1;padding:12px;background:var(--accent);color:#0a0a14;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit">
              ✅ Aggiorna
            </button>
            <button onclick="endLive()"
              style="flex:1;padding:12px;background:var(--sub);color:var(--muted);border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">
              No
            </button>
          </div>
        </div>`;
    }

    sc.innerHTML=`<div class="done-screen">
      <span class="trophy">🏆</span>
      <h2>Completato!</h2>
      <p style="color:var(--muted)">Ottimo lavoro, ${esc(profile.name||"")}! · ⏱ ${durStr}</p>
      ${weightPrompt}
      ${changeKeys.length===0?`<button class="btn-primary" style="max-width:280px" onclick="endLive()">Torna alle schede</button>`:""}
    </div>`;
    return;
  }
  const w=liveState.workout, ex=w.exercises[liveState.exIdx];
  const tot=Number(ex.sets);
  const rest=liveState.customRest!==null?liveState.customRest:Number(ex.rest);
  const prog=((liveState.exIdx+liveState.setIdx/tot)/w.exercises.length)*100;
  const isOT=liveState.overtime||false;
      const bgColor=isOT?"#2a0000":"#0d1f0d";
      const bdColor=isOT?"#6b0000":"#1a3a1a";
      const fgColor=isOT?"var(--red)":"var(--green)";
      const btnBg=isOT?"#6b0000":"#1a3a1a";
      const timerTxt=isOT?("-"+fmt(Math.abs(liveState.timerLeft))):fmt(liveState.timerLeft);
      const restLabel=isOT?"⚠️ Tempo extra — premi quando sei pronto!":"⏱ Recupero in corso";
      const btnLabel=isOT?"✅ Vai alla prossima serie":"Salta recupero ⏭";
      const restInputHtml=isOT?"":'<div class="rest-controls"><div class="rest-edit"><label>Modifica recupero (s)</label><input type="number" value="'+rest+'" min="0" oninput="chgRest(this.value)"></div></div>';
      const _dbExLive=EXERCISE_DB.find(e=>e.name===ex.name);
      const liveImgHtml=_dbExLive
        ?('<img src="'+_dbExLive.img0+'" onclick="showExDetail(\''+_dbExLive.id+'\')" style="width:80px;height:80px;border-radius:12px;object-fit:cover;margin-bottom:10px;cursor:pointer" onerror="this.style.display=\'none\'">')
        :"";
      const actionH=liveState.phase==="rest"
    ?`<div class="rest-card" style="background:${bgColor};border:1px solid ${bdColor}">
        <div class="rest-label" style="color:${fgColor}">${restLabel}</div>
        <div class="rest-timer" id="rtimer" style="color:${fgColor}">${timerTxt}</div>
        ${restInputHtml}
        <button onclick="skipRest()" style="margin-top:10px;width:100%;padding:14px;background:${btnBg};color:${fgColor};border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
          ${btnLabel}
        </button>
      </div>`
    :`<button class="btn-complete" onclick="completeSet()">✅ Serie completata</button>`;
  const listH=w.exercises.map((e,i)=>{
    const ic=i<liveState.exIdx?"✅":i===liveState.exIdx?"▶️":"⬜";
    const col=i===liveState.exIdx?"#fff":i<liveState.exIdx?"#555":"#aaa";
    return `<div class="live-ex-row"><span style="font-size:15px">${ic}</span>
      <span class="ex-name" style="color:${col}">${esc(e.name)}</span>
      <span class="ex-detail">${e.sets}×${e.reps}${e.weight?" · "+e.weight+"kg":""}</span></div>`;
  }).join("");
  sc.innerHTML=`
    <div class="live-header">
      <div>
        <div style="color:var(--accent);font-weight:800;font-size:15px">${esc(w.name)}</div>
        <div style="color:var(--muted);font-size:12px">Esercizio ${liveState.exIdx+1} / ${w.exercises.length}</div>
      </div>
      <button style="background:#3a1a1a;border:none;border-radius:8px;color:var(--red);padding:7px 14px;cursor:pointer;font-family:inherit;font-size:13px" onclick="endLive()">Termina</button>
    </div>
    <div class="live-progress"><div class="live-progress-fill" style="width:${prog}%"></div></div>
    <div class="live-content">
      <div class="live-ex-card">
        <div class="live-ex-label">Esercizio corrente</div>
        ${liveImgHtml}
        <div class="live-ex-name">${esc(ex.name)||"—"}</div>
        <div class="live-stats">
          <div><div class="live-stat-label">Serie</div><div class="live-stat-val">${liveState.setIdx+1} / ${tot}</div></div>
          <div><div class="live-stat-label">Ripetizioni</div><div class="live-stat-val">${ex.reps}</div></div>
          <div>
            <div class="live-stat-label">Peso (kg)</div>
            <input type="number" id="live-weight-inp"
              value="${ex.weight||""}"
              placeholder="—"
              onfocus="captureLiveWeightOld(this.value)"
              oninput="updLiveWeight(this.value)"
              style="width:70px;text-align:center;background:var(--sub);border:1px solid var(--border);border-radius:8px;padding:4px 6px;color:var(--accent);font-size:20px;font-weight:900;font-family:inherit;outline:none;">
          </div>
        </div>
      </div>
      ${actionH}
      <div class="live-list"><div class="live-list-title">Programma completo</div>${listH}</div>
    </div>`;
}

function captureLiveWeightOld(val){
  // Salva il peso originale al momento del focus (prima della digitazione)
  if(liveState._focusedExIdx !== liveState.exIdx){
    liveState._originalWeight = val;
    liveState._focusedExIdx = liveState.exIdx;
  }
}
window.captureLiveWeightOld=captureLiveWeightOld;

function updLiveWeight(val){
  const ex=liveState.workout.exercises[liveState.exIdx];
  const oldWeight=liveState._originalWeight!==undefined ? liveState._originalWeight : (ex.weight||"");
  ex.weight=val;
  if(val && val!==oldWeight){
    liveState.weightChanges[liveState.exIdx]={name:ex.name,oldWeight:oldWeight,newWeight:val};
  }
}
window.updLiveWeight=updLiveWeight;

function completeSet(){
  const w=liveState.workout, ex=w.exercises[liveState.exIdx];
  const tot=Number(ex.sets), next=liveState.setIdx+1;
  if(next>=tot){
    const nex=liveState.exIdx+1;
    if(nex>=w.exercises.length){liveState.done=true;saveWorkoutSession();checkWeightChanges();renderLive();return}
    liveState.exIdx=nex;liveState.setIdx=0;liveState.customRest=null;liveState._focusedExIdx=-1;liveState._originalWeight=undefined;
  }else liveState.setIdx=next;
  const rs=liveState.customRest!==null?liveState.customRest:Number(ex.rest);
  if(rs>0){
    liveState.phase="rest";liveState.timerLeft=rs;renderLive();
    liveState.overtime=false;
    liveTimer=setInterval(()=>{
      liveState.timerLeft--;
      if(liveState.timerLeft<0&&!liveState.overtime){
        liveState.overtime=true;renderLive();return;
      }
      const d=document.getElementById("rtimer");
      if(d)d.textContent=(liveState.overtime?"-":"")+fmt(Math.abs(liveState.timerLeft));
    },1000);
  }else{liveState.phase="work";renderLive()}
}
window.completeSet=completeSet;

function chgRest(v){
  clearInterval(liveTimer);const n=Number(v);
  liveState.customRest=n;liveState.timerLeft=n;
  const d=document.getElementById("rtimer");if(d)d.textContent=fmt(n);
  liveState.overtime=false;
  liveTimer=setInterval(()=>{
    liveState.timerLeft--;
    if(liveState.timerLeft<0&&!liveState.overtime){
      liveState.overtime=true;renderLive();return;
    }
    const dd=document.getElementById("rtimer");
    if(dd)dd.textContent=(liveState.overtime?"-":"")+fmt(Math.abs(liveState.timerLeft));
  },1000);
}
window.chgRest=chgRest;
function skipRest(){clearInterval(liveTimer);liveState.phase="work";liveState.overtime=false;renderLive()}
window.skipRest=skipRest;
function endLive(){clearInterval(liveTimer);liveState=null;showScreen("main");showTab("workouts")}
window.endLive=endLive;

function srchFood(q){

  const cat=window._currentFoodCat||"Tutti";

  // Also include matching recipes
  const recipes=window._sharedRecipes||[];
  const matchingRecipes=recipes.filter(r=>!q.trim()||r.name.toLowerCase().includes(q.toLowerCase()))
    .map(r=>({name:r.name+" 🍽️",kcal:r.totals.kcal,protein:r.totals.protein,carbs:r.totals.carbs,fat:r.totals.fat,unit:"1 porzione",cat:"Ricette",_recipeId:r.id,_portions:r.portions||1}));

     ["🌾 Carboidrati",r1(food.carbs*f),"g"],
     ["🥑 Grassi",r1(food.fat*f),"g"]].map(function(x){
      return '<div style="background:var(--sub);border-radius:10px;padding:10px;text-align:center">'+

        '<div style="font-size:18px;font-weight:900;color:#fff">'+x[1]+x[2]+'</div></div>';

async function confirmFoodQtyModal(){
  const food=window._modalFood||selectedFood;
  if(!food) return;
  const meal=MEAL_NAMES[_selectedMeal||0];
  const mainIngs=window._modalMainIngs||[];
  if(mainIngs.length>0){
    // Use pre-calculated values from updateRecipeMainQty
    await _addEntry({
      name:food.name,
      kcal:Math.round(food.kcal),
      protein:r1(food.protein),
      carbs:r1(food.carbs),
      fat:r1(food.fat),
      meal:meal
    });
  } else {
    const qty=Number((document.getElementById("fqm-qty")||{}).value)||1;
    const baseQty=window._modalBaseQty||100;
    const f=qty/baseQty;
    await _addEntry({
      name:food.name+" ("+qty+"g)",
      kcal:Math.round(food.kcal*f),
      protein:r1(food.protein*f),
      carbs:r1(food.carbs*f),
      fat:r1(food.fat*f),
      meal:meal
    });
  }
  window._modalMainIngs=null;
  window._modalRecipe=null;
  closeFoodQtyModalForce();
}

async function saveFoodDB(){
  const name = document.getElementById("fdb-name").value.trim();
  if(!name){ alert("Inserisci il nome"); return; }
  const newFood = {
    name, unit: document.getElementById("fdb-unit").value||"100g",
    kcal: Number(document.getElementById("fdb-kcal").value)||0,
    protein: Number(document.getElementById("fdb-pro").value)||0,
    carbs: Number(document.getElementById("fdb-car").value)||0,
    fat: Number(document.getElementById("fdb-fat").value)||0,
    cat: (()=>{
      const sel=document.getElementById("fdb-cat").value;
      if(sel==="__new__"){
        const nc=(document.getElementById("fdb-newcat")||{}).value||"";
        return nc.trim()||"Personalizzati";
      }
      return sel||"Personalizzati";
    })()

function updateVersionIndicator(ok){
  const icon=document.getElementById("version-icon");

  if(!ind) return;
  if(ok===null){
    if(icon) icon.textContent="⏳";
    if(txt){txt.textContent="v"+APP_VERSION;txt.style.color="var(--muted)";}
    ind.style.cursor="default";
    ind.onclick=null;
  } else if(ok){
    if(icon) icon.textContent="✅";
    if(txt){txt.textContent="v"+APP_VERSION;txt.style.color="var(--green)";}
    ind.style.cursor="default";

  } else {

    if(txt){txt.textContent="v"+APP_VERSION;txt.style.color="var(--red)";}
    ind.style.cursor="pointer";
    ind.title="Tocca per istruzioni aggiornamento";

// Automatically publish if local version is newer than Firestore
async function autoPublishIfNewer(){
  try{
    const snap=await getDoc(doc(db,"appMeta","version"));
    const serverVer=snap.exists()?snap.data().version:null;
    if(!serverVer||compareVersions(APP_VERSION,serverVer)>0){
      await publishAppVersion();
      console.log("Published new version:",APP_VERSION);
    }
  }catch(e){}
}

function compareVersions(a,b){
  const pa=a.split(".").map(Number);
  const pb=b.split(".").map(Number);
  for(let i=0;i<3;i++){
    const diff=(pa[i]||0)-(pb[i]||0);
    if(diff!==0) return diff;
  }
  return 0;
}

async function buildBWChartHtml(entries){
  if(!entries||entries.length<1) return "";
  // Single entry: show just the value card
  if(entries.length===1){
    const e=entries[0];
    return `<div class="card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;color:#fff;margin-bottom:8px">⚖️ Peso corporeo</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:36px;font-weight:900;color:var(--accent2)">${e.weight} <span style="font-size:16px;color:var(--muted)">kg</span></div>
        <div style="text-align:right;color:var(--muted);font-size:12px">Registrato il<br>${new Date(e.date).toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"})}</div>
      </div>
      <p style="color:#555;font-size:12px;margin-top:8px">Registra altri pesi nel Profilo per vedere il grafico.</p>
    </div>`;
  }
  const weights=entries.map(e=>e.weight);
  const minW=Math.min(...weights), maxW=Math.max(...weights);
  const range=maxW-minW||1;
  const W=300,H=90,padL=34,padB=22,padT=10,padR=10;
  const chartW=W-padL-padR, chartH=H-padB-padT;
  const n=entries.length;
  const pts=entries.map((e,i)=>({
    x:padL+(n===1?chartW/2:i/(n-1)*chartW),
    y:padT+chartH-(e.weight-minW)/range*chartH,
    w:e.weight,
    date:new Date(e.date).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"})
  }));
  const linePath=pts.map((p,i)=>(i===0?"M":"L")+p.x+","+p.y).join(" ");
  const fillPath=linePath+" L"+pts[pts.length-1].x+","+(padT+chartH)+" L"+pts[0].x+","+(padT+chartH)+" Z";
  const first=weights[0],last=weights[weights.length-1];
  const diff=Math.round((last-first)*10)/10;
  const trendColor=diff<0?"var(--green)":diff>0?"var(--red)":"var(--muted)";
  const trendIcon=diff<0?"↓":diff>0?"↑":"→";
  const yLabels=[minW,Math.round((minW+maxW)/2*10)/10,maxW];
  return `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-weight:700;font-size:14px;color:#fff">⚖️ Andamento peso</div>
        <div style="font-size:12px;color:var(--muted)">${n} misurazioni · Min: ${minW}kg · Max: ${maxW}kg</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:900;color:${trendColor}">${trendIcon} ${diff!==0?(diff>0?"+":"")+diff+"kg":"stabile"}</div>
        <div style="font-size:11px;color:var(--muted)">${pts[0].date} → ${pts[pts.length-1].date}</div>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      ${[0,0.5,1].map(t=>"<line x1='"+padL+"' y1='"+(padT+chartH-t*chartH)+"' x2='"+(W-padR)+"' y2='"+(padT+chartH-t*chartH)+"' stroke='#2a2a3e' stroke-width='1'/>").join("")}
      ${yLabels.map((v,i)=>"<text x='"+(padL-4)+"' y='"+(padT+chartH-[0,0.5,1][i]*chartH+4)+"' text-anchor='end' fill='#555' font-size='9'>"+v+"</text>").join("")}
      <path d="${fillPath}" fill="rgba(96,165,250,0.08)"/>
      <path d="${linePath}" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map(p=>"<circle cx='"+p.x+"' cy='"+p.y+"' r='4' fill='var(--accent2)' stroke='var(--bg)' stroke-width='2'/>").join("")}
      ${pts.filter((_,i)=>n<=4||i===0||i===n-1||i===Math.floor(n/2)).map(p=>"<text x='"+p.x+"' y='"+(H-2)+"' text-anchor='middle' fill='#555' font-size='8'>"+p.date+"</text>").join("")}
    </svg>
  </div>`;
}

async function renderProgressTab(){
  const el=document.getElementById("tab-history");
  // Get all sessions
  const q=query(collection(db,"sessions"),where("uid","==",CU.uid));
  const snap=await getDocs(q);
  const sessions=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Body weight chart - always show if data exists
  const bwE=await loadBodyWeights();
  if(bwE.length>=1){
    const bwHtml=await buildBWChartHtml(bwE);
    el.innerHTML+=bwHtml;
  }

  if(!sessions.length){
    if(bwE.length<2) el.innerHTML+=`<p class="empty" style="margin-top:20px">Completa almeno un allenamento e registra il peso corporeo nel profilo per vedere la progressione.</p>`;
    return;
  }

  // Build exercise→weights map
  const exMap={};
  sessions.forEach(s=>{
    const dateStr=new Date(s.date).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"});
    (s.exercises||[]).forEach(ex=>{
      if(!ex.weight||ex.weight==="") return;
      const w=Number(ex.weight);
      if(!w) return;
      if(!exMap[ex.name]) exMap[ex.name]=[];
      exMap[ex.name].push({date:dateStr,weight:w,fullDate:s.date});
    });
  });

  const exNames=Object.keys(exMap).filter(n=>exMap[n].length>=1);
  if(!exNames.length){
    el.innerHTML+=`<div class="card" style="text-align:center;padding:24px;margin-top:12px"><p style="color:#555">Nessun peso registrato negli allenamenti.</p><p style="color:#555;font-size:12px;margin-top:6px">Inserisci i kg durante il live per vedere la progressione.</p></div>`;
    return;
  }

  let chartsHtml=`<div style="margin-top:4px">`;

  exNames.forEach(name=>{
    const pts=exMap[name];
    if(pts.length<1) return;
    const weights=pts.map(p=>p.weight);
    const minW=Math.min(...weights);
    const maxW=Math.max(...weights);
    const range=maxW-minW||1;
    const W=300, H=80, padL=32, padB=20, padT=10, padR=10;
    const chartW=W-padL-padR, chartH=H-padB-padT;
    const n=pts.length;

    // SVG points
    const svgPts=pts.map((p,i)=>{
      const x=padL+(n===1?chartW/2:i/(n-1)*chartW);
      const y=padT+chartH-(p.weight-minW)/range*chartH;
      return {x,y,w:p.weight,date:p.date};
    });

    // Line path
    const linePath=svgPts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
    // Fill path
    const fillPath=linePath+` L${svgPts[svgPts.length-1].x},${padT+chartH} L${svgPts[0].x},${padT+chartH} Z`;

    // Y axis labels
    const yLabels=[minW, Math.round((minW+maxW)/2), maxW];

    // Trend
    const first=weights[0], last=weights[weights.length-1];
    const diff=last-first;
    const trendColor=diff>0?"var(--green)":diff<0?"var(--red)":"var(--muted)";
    const trendIcon=diff>0?"↑":diff<0?"↓":"→";
    const trendStr=diff!==0?(diff>0?"+":"")+diff.toFixed(1)+"kg":"stabile";

    chartsHtml+=`
    <div class="card" style="margin-bottom:12px;padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:14px;color:#fff">${esc(name)}</div>
          <div style="font-size:12px;color:var(--muted)">${n} sessioni · Max: ${maxW}kg</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:900;color:${trendColor}">${trendIcon} ${trendStr}</div>
          <div style="font-size:11px;color:var(--muted)">${pts[0].date} → ${pts[pts.length-1].date}</div>
        </div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
        <!-- Grid lines -->
        ${[0,0.5,1].map(t=>{
          const y=padT+chartH-t*chartH;
          return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2a2a3e" stroke-width="1"/>`;
        }).join("")}
        <!-- Y labels -->
        ${yLabels.map((v,i)=>{
          const y=padT+chartH-[0,0.5,1][i]*chartH;
          return `<text x="${padL-4}" y="${y+4}" text-anchor="end" fill="#555" font-size="9">${v}</text>`;
        }).join("")}
        <!-- Fill area -->
        <path d="${fillPath}" fill="rgba(232,255,71,0.06)"/>
        <!-- Line -->
        <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <!-- Points -->
        ${svgPts.map(p=>`
          <circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>
        `).join("")}
        <!-- X labels (date) - show max 4 -->
        ${svgPts.filter((_,i)=>n<=4||i===0||i===n-1||i===Math.floor(n/2)).map(p=>`
          <text x="${p.x}" y="${H-2}" text-anchor="middle" fill="#555" font-size="8">${p.date}</text>
        `).join("")}
      </svg>
    </div>`;
  });

  chartsHtml+="</div>";
  el.innerHTML+=chartsHtml;
}

async function getFirestoreUsage(){
  // Stima documenti: users(1) + workouts(n) + diary(n) + sessions(n)
  let count=1; // user doc
  try{
    const [wSnap,sSnap]=await Promise.all([
      getDocs(query(collection(db,"workouts"),where("uid","==",CU.uid))),
      getDocs(query(collection(db,"sessions"),where("uid","==",CU.uid))),
    ]);
    // diary docs: hard to count without extra query, estimate from sessions
    count += wSnap.size + sSnap.size;
    // Spark plan: 1GB storage, ~each doc ~1KB average
    // Free reads: 50k/day, writes: 20k/day
    return {workouts:wSnap.size, sessions:sSnap.size, totalDocs:count};
  }catch(e){return {workouts:0,sessions:0,totalDocs:count}}
}

function calcBMI(weight,height){
  if(!weight||!height)return null;
  return weight/((height/100)**2);
}
function bmiCategory(bmi){
  if(bmi<18.5)return{label:"Sottopeso",color:"var(--accent2)"};
  if(bmi<25)return{label:"Normopeso ✅",color:"var(--green)"};
  if(bmi<30)return{label:"Sovrappeso",color:"var(--orange)"};
  return{label:"Obesità",color:"var(--red)"};
}
function calcIdealWeight(height){
  if(!height)return null;
  // Range basato su BMI 21-23 (più corretto clinicamente)
  const h=height/100;
  const min=Math.round(21*h*h*10)/10;
  const max=Math.round(23*h*h*10)/10;
  return {min,max};
}
function calcTDEE(weight,height,age,gender,activity){
  if(!weight||!height||!age)return null;
  // Harris-Benedict
  let bmr=gender==="F"
    ? 447.6+(9.25*weight)+(3.1*height)-(4.33*age)
    : 88.36+(13.4*weight)+(4.8*height)-(5.68*age);
  const actMap={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9};
  return Math.round(bmr*(actMap[activity]||1.55));
}
function calcMacros(tdee,goal,weight){
  // 1. Proteine: moltiplicatore varia per obiettivo
  const proteinMult={bulk:1.6,cut:1.4,maintain:1.2,recomp:1.5};
  const protein=Math.round((proteinMult[goal]||1.4)*weight);
  const proteinKcal=protein*4;
  // 2. Kcal rimanenti dopo le proteine
  const remaining=tdee-proteinKcal;
  // 3. Grassi: 25% delle kcal rimanenti → / 9 kcal/g
  const fatKcal=Math.round(remaining*0.25);
  const fat=Math.round(fatKcal/9);
  // 4. Carbo: il restante → / 4 kcal/g
  const carbsKcal=remaining-fatKcal;
  const carbs=Math.round(carbsKcal/4);
  return {protein,carbs,fat,totalKcal:tdee};
}

function updatePhysique(field,val){
  if(!profile.physique)profile.physique={weight:"",height:"",age:"",gender:"M",activity:"moderate",goal:"maintain"};

}

async function savePhysique(){
  if(!profile.physique)profile.physique={};
  ["age","weight","height","gender","activity","goal"].forEach(f=>{
    const el=document.getElementById("p-"+f);
    if(el)profile.physique[f]=el.value;
  });
  await setDoc(doc(db,"users",CU.uid),profile,{merge:true});
  toast("✓ Dati salvati!");
  renderProfileTab();
}
window.savePhysique=savePhysique;

async function applyMacrosToGoals(kcal,protein,carbs,fat){
  profile.goals={kcal,protein,carbs,fat};

  toast("✓ Obiettivi nutrizione aggiornati!");
}
window.applyMacrosToGoals=applyMacrosToGoals;

function renderRecipesList(){
  const el=document.getElementById("recipes-list");
  if(!el) return;
  const allRecipes=window._sharedRecipes||[];
  const q=(window._recipesSearch||"").toLowerCase();
  const recipes=q?allRecipes.filter(r=>r.name.toLowerCase().includes(q)):allRecipes;

  // Search bar (only once)
  if(!document.getElementById("recipes-search-inp")&&allRecipes.length>0){
    const bar=document.createElement("div");
    bar.style.cssText="margin-bottom:12px";
    bar.innerHTML='<input type="text" id="recipes-search-inp" placeholder="🔍 Cerca ricetta…" style="width:100%;background:var(--sub);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none">';
    el.parentNode.insertBefore(bar,el);
    document.getElementById("recipes-search-inp").addEventListener("input",function(){
      window._recipesSearch=this.value;

  if(!allRecipes.length){
    el.innerHTML=`<p class="empty" style="margin-top:20px">Nessuna ricetta condivisa.<br>Creane una! 🍽️</p>`;

    el.innerHTML=`<p style="color:var(--muted);font-size:13px;text-align:center;margin-top:16px">Nessuna ricetta trovata.</p>`;

  el.innerHTML=recipes.map(r=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div class="card-title">${esc(r.name)}</div>
          <div class="card-sub">${r.portions||1} porzione/i · ${Math.round(r.totals.kcal)} kcal · P ${Math.round(r.totals.protein)}g · C ${Math.round(r.totals.carbs)}g · G ${Math.round(r.totals.fat)}g</div>
          <div class="card-sub" style="margin-top:2px;color:#555">Creata da ${esc(r.createdBy||"")}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn-icon" onclick="editRecipe('${r.id}')">✏️</button>
          <button class="btn-icon success" onclick="addRecipeToDiary('${r.id}')">+</button>
          <button class="btn-icon danger" onclick="deleteRecipe('${r.id}')">🗑️</button>
        </div>
      </div>
    </div>`).join("");
}

function addRecipeIngredient(){
