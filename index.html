<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FitCouple 💪</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap');
:root{
  --accent:#e8ff47;--accent2:#60a5fa;--green:#4ade80;
  --red:#ff6b6b;--orange:#f59e0b;
  --bg:#0a0a14;--card:#12121e;--border:#2a2a3e;--muted:#888;--sub:#1a1a2e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'DM Sans',system-ui,sans-serif}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;padding:20px 16px}
/* LOADER */
#screen-loader{background:var(--bg);justify-content:center;align-items:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.header-user{display:flex;align-items:center;gap:10px}
.header-name{font-weight:800;font-size:15px;color:var(--accent)}
.header-sub{font-size:11px;color:var(--muted)}
.btn-logout{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit}
/* NAV */
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;color:#555;cursor:pointer;font-family:inherit;transition:color .2s;gap:3px}
.nav-btn.active{color:var(--accent)}
.nav-btn span:first-child{font-size:20px}
.nav-btn span:last-child{font-size:11px}
/* AUTH */
#screen-auth{background:var(--bg);justify-content:center;align-items:center;padding:24px;overflow-y:auto}
.auth-card{width:100%;max-width:380px;background:var(--card);border-radius:24px;padding:28px;border:1px solid var(--border)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .logo-icon{font-size:48px;display:block}
.auth-logo h1{font-size:30px;font-weight:900;color:var(--accent);letter-spacing:-1px;margin:8px 0 4px}
.auth-logo p{color:var(--muted);font-size:14px}
.auth-error{color:var(--red);font-size:13px;margin-bottom:12px;text-align:center;padding:8px 12px;background:rgba(255,107,107,.1);border-radius:8px}
.toggle-group{display:flex;background:var(--sub);border-radius:12px;padding:4px;margin-bottom:20px}
.toggle-btn{flex:1;padding:9px 0;border:none;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#0a0a14}
.form-group{margin-bottom:14px}
.form-label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=date]{
  width:100%;max-width:100%;background:var(--sub);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;box-sizing:border-box}
input:focus{border-color:var(--accent)}
.avatar-picker{display:flex;gap:8px;flex-wrap:wrap}
.avatar-opt{font-size:24px;background:var(--sub);border:2px solid var(--border);border-radius:10px;width:44px;height:44px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.avatar-opt.selected{border-color:var(--accent);background:rgba(232,255,71,.1)}
/* BUTTONS */
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#0a0a14;border:none;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-add{background:var(--accent);color:#0a0a14;border:none;border-radius:10px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-icon{background:var(--sub);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:16px}
.btn-icon.danger{background:#3a1a1a}
.btn-icon.success{background:#1a3a1a}
.btn-back{background:var(--sub);color:var(--muted);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-family:inherit}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit;width:100%;margin-bottom:10px}
/* CARDS */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:20px;font-weight:800;color:#fff}
.card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.card-row{display:flex;align-items:center;gap:12px}
.card-title{font-weight:700;font-size:15px;color:#fff;margin-bottom:3px}
.card-sub{font-size:12px;color:var(--muted)}
.card-actions{display:flex;gap:8px;flex-shrink:0}
.empty{color:#555;text-align:center;margin-top:50px;font-size:14px}
.progress-track{height:6px;background:var(--sub);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.macro-row{margin-bottom:10px}
.macro-label-row{display:flex;justify-content:space-between;margin-bottom:4px}
.macro-label{color:var(--muted);font-size:12px}
.macro-val{font-size:12px;font-weight:700}
/* EDITOR */
.ex-card{background:var(--sub);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.ex-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:10px}
.ex-grid input{border-radius:8px;padding:8px 10px;font-size:13px}
/* LIVE */
#screen-live{background:var(--bg)}
.live-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.live-progress{height:4px;background:var(--sub);flex-shrink:0}
.live-progress-fill{height:100%;background:var(--accent);transition:width .4s}
.live-content{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.live-ex-card{background:var(--card);border-radius:20px;padding:24px;text-align:center;border:1px solid var(--border)}
.live-ex-label{color:var(--muted);font-size:13px;margin-bottom:8px}
.live-ex-name{font-size:22px;font-weight:900;color:#fff;margin-bottom:20px}
.live-stats{display:flex;justify-content:center;gap:28px}
.live-stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;margin-bottom:4px}
.live-stat-val{color:var(--accent);font-size:22px;font-weight:900}
.rest-card{background:#0d1f0d;border-radius:20px;padding:24px;text-align:center;border:1px solid #1a3a1a}
.rest-label{color:var(--green);font-size:13px;margin-bottom:8px}
.rest-timer{font-size:68px;font-weight:900;color:var(--green);line-height:1;margin-bottom:16px;font-variant-numeric:tabular-nums}
.rest-controls{justify-content:center;margin-bottom:14px}
.rest-edit{text-align:center}
.rest-edit label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
.rest-edit input{width:90px;text-align:center}
.btn-skip{background:#1a3a1a;color:var(--green);border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-complete{background:var(--accent);color:#0a0a14;border:none;border-radius:16px;padding:20px;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s}
.btn-complete:active{opacity:.85}
.live-list{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border)}
.live-list-title{color:var(--muted);font-size:12px;margin-bottom:10px}
.live-ex-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--sub)}
.live-ex-row:last-child{border-bottom:none}
.live-ex-row .ex-name{flex:1;font-size:13px}
.live-ex-row .ex-detail{color:#555;font-size:11px}
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px;text-align:center}
.done-screen .trophy{font-size:88px}
.done-screen h2{color:var(--accent);font-size:28px;font-weight:900}
/* GROUP PILLS */
.group-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.group-pill{padding:5px 12px;border-radius:20px;background:var(--sub);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.group-pill.active{background:var(--accent);color:#0a0a14;border-color:var(--accent)}
/* EXERCISE PICKER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.modal-inner{background:var(--bg);border-radius:20px 20px 0 0;margin-top:auto;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;color:#fff}
.modal-close{background:var(--sub);border:none;border-radius:8px;color:var(--muted);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:13px}
.modal-scroll{flex:1;overflow-y:auto;padding:16px}
.ex-db-card{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:12px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.ex-db-card:active{border-color:var(--accent)}
.ex-db-img{width:60px;height:60px;border-radius:8px;object-fit:cover;background:var(--sub);flex-shrink:0}
.ex-db-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.ex-db-meta{font-size:11px;color:var(--muted)}
.ex-detail-img{width:100%;border-radius:12px;margin-bottom:14px;background:var(--sub);min-height:200px;object-fit:cover}
/* FOOD */
.food-result{cursor:pointer;transition:border-color .15s}
.food-result.selected{border-color:var(--accent);background:rgba(232,255,71,.04)}
/* GOALS */
.goals-summary{background:var(--card);border-radius:16px;padding:16px;margin-top:20px;border:1px solid var(--border)}
.goals-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sub)}
.goals-row:last-child{border-bottom:none}
/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0a14;font-size:13px;font-weight:700;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}

.ex-anim-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--sub)}
.ex-anim-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ex-anim-thumb .ex-anim-frame2{opacity:0;animation:exFrameSwap 1.8s steps(1) infinite}
@keyframes exFrameSwap{0%,50%{opacity:0}50.01%,100%{opacity:1}}
</style>
</head>
<body>
<div id="app">

  <div id="screen-loader" class="screen active">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:14px">Connessione a Firebase…</p>
  </div>

  <div id="screen-auth" class="screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">💪</span>
        <h1>FitCouple</h1>
        <p>Il tuo compagno di allenamento</p>
      </div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-login" onclick="switchAuthMode('login')">Accedi</button>
        <button class="toggle-btn" id="btn-register" onclick="switchAuthMode('register')">Registrati</button>
      </div>
      <div id="auth-error" class="auth-error" style="display:none"></div>
      <div id="register-fields" style="display:none">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input type="text" id="reg-name" placeholder="Il tuo nome">
        </div>
        <div class="form-group">
          <label class="form-label">Avatar</label>
          <div class="avatar-picker" id="avatar-picker"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Email partner (opzionale)</label>
          <input type="email" id="reg-partner" placeholder="partner@email.com">
          <p style="color:#555;font-size:11px;margin-top:4px">Lascia vuoto se usi l'app da solo</p>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="auth-email" placeholder="email@esempio.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="auth-password" placeholder="minimo 6 caratteri">
      </div>
      <button class="btn-primary" id="auth-btn" onclick="authSubmit()">Entra</button>
      <p id="reset-link" style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted);cursor:pointer;display:none" onclick="sendReset()">
        Password dimenticata?
      </p>
    </div>
  </div>

  <div id="screen-main" class="screen" style="flex-direction:column">
    <div class="app-header">
      <div class="header-user">
        <span id="hdr-avatar" style="font-size:28px;line-height:1">💪</span>
        <div style="margin-left:10px">
          <div class="header-name" id="hdr-name">…</div>
          <div class="header-sub">FitCouple</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-logout" onclick="logout()">Esci</button>
      </div>
    </div>
    <div id="tab-workouts" class="scroll-area" style="display:none"></div>
    <div id="tab-nutrition" class="scroll-area" style="display:none"></div>
    <div id="tab-program"   class="scroll-area" style="display:none"></div>
    <div id="tab-goals"     class="scroll-area" style="display:none"></div>
    <div id="tab-history"   class="scroll-area" style="display:none"></div>
    <div id="tab-profile"   class="scroll-area" style="display:none"></div>
    <nav class="bottom-nav">
      <button class="nav-btn" id="nav-program"   onclick="showTab('program')"><span>📅</span><span>Piano</span></button>
      <button class="nav-btn" id="nav-workouts" onclick="showTab('workouts')"><span>🏋️</span><span>Schede</span></button>
      <button class="nav-btn" id="nav-nutrition" onclick="showTab('nutrition')"><span>🥗</span><span>Diario</span></button>
      <button class="nav-btn" id="nav-history"   onclick="showTab('history')"><span>📋</span><span>Storico</span></button>
      <button class="nav-btn" id="nav-profile"   onclick="showTab('profile')"><span>👤</span><span>Profilo</span></button>
    </nav>
  </div>

  <div id="screen-live" class="screen"></div>

  <!-- FOOD QUANTITY MODAL -->
  <div id="food-qty-modal" style="display:none" class="modal-overlay" onclick="closeFoodQtyModal(event)">
    <div class="modal-inner" style="max-height:70dvh">
      <div class="modal-header">
        <span class="modal-title" id="fqm-title">Aggiungi alimento</span>
        <button class="modal-close" onclick="closeFoodQtyModalForce()">✕</button>
      </div>
      <div class="modal-scroll">
        <p id="fqm-meta" style="color:var(--muted);font-size:12px;margin-bottom:16px"></p>
        <div class="form-group">
          <label class="form-label">Quantità (g / ml)</label>
          <input type="number" id="fqm-qty" value="100" min="1"
            style="font-size:20px;font-weight:700;text-align:center"
            oninput="updateFoodQtyModal()">
        </div>
        <div id="fqm-preview" class="card" style="margin-bottom:16px"></div>
        <button class="btn-primary" onclick="confirmFoodQtyModal()">✅ Aggiungi al diario</button>
      </div>
    </div>
  </div>
  <!-- EXERCISE PICKER MODAL -->
  <div id="ex-modal" style="display:none" class="modal-overlay" onclick="closeExModal(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="modal-title">📚 Seleziona esercizio</span>
        <button class="modal-close" onclick="closeExModalForce()">✕ Chiudi</button>
      </div>
      <div class="modal-scroll">
        <input type="text" id="ex-search-inp" placeholder="🔍 Cerca esercizio…" oninput="filterExList(this.value)"
          style="width:100%;margin-bottom:12px;background:var(--sub);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none">
        <div class="group-pills" id="ex-group-pills" style="margin-bottom:8px"></div>
        <div class="group-pills" id="ex-equip-pills" style="margin-bottom:14px"></div>
        <div id="ex-list"></div>
      </div>
    </div>
  </div>
  <!-- EXERCISE DETAIL MODAL -->
  <div id="ex-detail" style="display:none" class="modal-overlay" onclick="closeExDetail(event)">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="modal-title" id="ex-detail-title">Esercizio</span>
        <button class="modal-close" onclick="closeExDetailForce()">✕</button>
      </div>
      <div class="modal-scroll">
        <img id="ex-detail-img" src="" class="ex-detail-img" alt="" onerror="this.style.display='none'">
        <p id="ex-detail-group" style="color:var(--accent);font-size:12px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px"></p>
        <p id="ex-detail-instr" style="color:#ccc;font-size:13px;line-height:1.7;margin-bottom:16px"></p>
        <button class="btn-primary" onclick="addExFromDB()">+ Aggiungi alla scheda</button>
      </div>
    </div>
  </div>
</div>
<div id="toast">✓ Salvato</div>

function switchAuthMode(m){
  authMode=m;
  document.getElementById("btn-login").classList.toggle("active",m==="login");
  document.getElementById("btn-register").classList.toggle("active",m==="register");
  document.getElementById("register-fields").style.display=m==="register"?"block":"none";

function showAuthErr(msg){const e=document.getElementById("auth-error");e.textContent=msg;e.style.display="block"}

async function authSubmit(){
  const email=document.getElementById("auth-email").value.trim();
  const pwd=document.getElementById("auth-password").value;
  const btn=document.getElementById("auth-btn");
  btn.disabled=true;btn.textContent="…";
  try{
    if(authMode==="login"){
      await signInWithEmailAndPassword(auth,email,pwd);
    }else{
      const name=document.getElementById("reg-name").value.trim();
      if(!name){showAuthErr("Inserisci il tuo nome.");btn.disabled=false;btn.textContent="Crea profilo";return}
      const partnerEmail=(document.getElementById("reg-partner").value||"").trim().toLowerCase();
      const cred=await createUserWithEmailAndPassword(auth,email,pwd);
      // Determine coupleId
      let coupleId=cred.user.uid; // default: solo
      if(partnerEmail){
        // Check coupleLinks for partner's existing coupleId
        const linkRef=doc(db,"coupleLinks",partnerEmail.replace("@","_").replace(/\./g,"_"));
        const linkSnap=await getDoc(linkRef);
        if(linkSnap.exists()&&linkSnap.data().coupleId){
          coupleId=linkSnap.data().coupleId;
        } else {
          coupleId=uid()+uid();
        }
        // Register our email→coupleId mapping
        const myLinkRef=doc(db,"coupleLinks",email.toLowerCase().replace("@","_").replace(/\./g,"_"));
        await setDoc(myLinkRef,{email:email.toLowerCase(),coupleId,partnerEmail});
      }
      await setDoc(doc(db,"users",cred.user.uid),{
        name,avatar:selAvatar,
        goals:{kcal:2000,protein:150,carbs:200,fat:65},
        partnerEmail:partnerEmail||null,
        coupleId:coupleId
      });
    }
  }catch(e){
    const msgs={"auth/invalid-credential":"Email o password errati.","auth/email-already-in-use":"Email già registrata.","auth/weak-password":"Password troppo corta (min 6).","auth/invalid-email":"Email non valida."};
    showAuthErr(msgs[e.code]||e.message);
    btn.disabled=false;btn.textContent=authMode==="login"?"Entra":"Crea profilo";
  }
}

      '<div style="display:grid;grid-template-columns:28px 1fr 1fr;gap:6px;align-items:center">'+

      '<div><label class="form-label">Kg</label>'+
      '<input type="number" value="'+(sd.weight||'')+'" placeholder="—" oninput="updSetRow('+i+','+si+',&quot;weight&quot;,this.value)" style="border-radius:8px;padding:8px;font-size:14px"></div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding-left:34px">'+
        '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:'+(sd.iso?'var(--accent)':'var(--muted)')+'">'+
        '<input type="checkbox" '+(sd.iso?'checked':'')+' onchange="toggleSetIso('+i+','+si+',this.checked)" style="width:15px;height:15px"> 🧘 Isometria</label>'+
        (sd.iso?'<input type="number" value="'+(sd.isoSec||'')+'" min="1" placeholder="sec" oninput="updSetRow('+i+','+si+',&quot;isoSec&quot;,this.value)" style="width:70px;border-radius:8px;padding:6px;font-size:13px"><span style="font-size:12px;color:var(--muted)">s</span>':'')+
      '</div>'+

function startLive(id){
  const w=workouts.find(w=>w.id===id);
  if(!w||(w.exercises||[]).length===0){alert("Aggiungi almeno un esercizio!");return}
  const wCopy=JSON.parse(JSON.stringify(w));
  wCopy.exercises.forEach(ex=>{
    const isTime=ex.mode==="time";
    if(!ex.setData||ex.setData.length!==Number(ex.sets)){
      ex.setData=Array.from({length:Number(ex.sets)||3},()=>(isTime?{seconds:Number(ex.seconds)||30}:{reps:Number(ex.reps)||10,weight:Number(ex.weight)||0}));
    }
  });
  liveState={workout:wCopy,_workoutId:id,exIdx:0,setIdx:0,phase:"work",timerLeft:0,customRest:null,done:false,startTime:Date.now(),weightChanges:{},pendingWeightUpdate:{},pendingExAdvance:null,exTimer:null,exTimerLeft:0,exTimerRunning:false};
  clearInterval(liveTimer);renderLive();showScreen("live");requestWakeLock();
}
window.startLive=startLive;

// ═══ WAKE LOCK: tieni schermo acceso durante allenamento ═══
let _wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock=await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release',()=>{});
    }
  }catch(e){ /* non supportato o negato */ }
}
function releaseWakeLock(){
  try{ if(_wakeLock){ _wakeLock.release(); _wakeLock=null; } }catch(e){}
}
// Riattiva il wake lock se la tab torna visibile durante l'allenamento
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && liveState && !liveState.done){ requestWakeLock(); }
});

function captureLiveWeightOld(val){
  // Salva il peso originale al momento del focus (prima della digitazione)
  if(liveState._focusedExIdx !== liveState.exIdx){
    liveState._originalWeight = val;
    liveState._focusedExIdx = liveState.exIdx;
  }
}
window.captureLiveWeightOld=captureLiveWeightOld;

function updLiveSetData(field,val){
  const ex=liveState.workout.exercises[liveState.exIdx];
  if(!ex.setData) ex.setData=[];
  if(!ex.setData[liveState.setIdx]) ex.setData[liveState.setIdx]={reps:Number(ex.reps)||10,weight:Number(ex.weight)||0};
  ex.setData[liveState.setIdx][field]=Number(val)||0;
}
window.updLiveSetData=updLiveSetData;

function toggleExTimer(){
  const ex=liveState.workout.exercises[liveState.exIdx];
  const sd=ex.setData&&ex.setData[liveState.setIdx];
  const totalSecs=(sd?sd.seconds:ex.seconds)||30;
  const btn=document.getElementById("ex-timer-btn");
  if(liveState.exTimerRunning){
    clearInterval(liveState.exTimer);liveState.exTimerRunning=false;
    if(btn){btn.textContent="▶️ Riprendi";btn.style.background="var(--accent)";}
    return;
  }
  if(liveState.exTimerLeft<=0) liveState.exTimerLeft=totalSecs;
  liveState.exTimerRunning=true;
  if(btn){btn.textContent="⏸ Pausa";}
  clearInterval(liveState.exTimer);
  liveState.exTimer=setInterval(()=>{
    liveState.exTimerLeft--;
    const d=document.getElementById("ex-timer-display");
    if(d) d.textContent=fmt(Math.max(0,liveState.exTimerLeft));
    if(liveState.exTimerLeft<=0){
      clearInterval(liveState.exTimer);liveState.exTimerRunning=false;
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      const b=document.getElementById("ex-timer-btn");
      if(b){b.textContent="✅ Fatto!";b.style.background="var(--green)";}
      if(d){d.textContent="0:00";d.style.color="var(--green)";}
    }
  },1000);
}
window.toggleExTimer=toggleExTimer;
function updLiveWeight(val){
  const ex=liveState.workout.exercises[liveState.exIdx];
  const oldWeight=liveState._originalWeight!==undefined ? liveState._originalWeight : (ex.weight||"");
  ex.weight=val;
  if(val && val!==oldWeight){
    liveState.weightChanges[liveState.exIdx]={name:ex.name,oldWeight:oldWeight,newWeight:val};
  }
}
window.updLiveWeight=updLiveWeight;

function applyPendingAdvance(){
  if(liveState && liveState.pendingExAdvance){
    const p=liveState.pendingExAdvance;
    liveState.exIdx=p.exIdx; liveState.setIdx=p.setIdx;
    liveState.customRest=null; liveState._focusedExIdx=-1; liveState._originalWeight=undefined;
    liveState.pendingExAdvance=null;
    clearInterval(liveState.exTimer);
    liveState.exTimerLeft=0; liveState.exTimerRunning=false;
  }
}
window.applyPendingAdvance=applyPendingAdvance;
function getSupersetGroup(w, startIdx){
  let gStart=startIdx;
  while(gStart>0 && w.exercises[gStart-1].supersetNext) gStart--;
  let gEnd=gStart;
  while(gEnd<w.exercises.length-1 && w.exercises[gEnd].supersetNext) gEnd++;
  return {start:gStart, end:gEnd};
}

function completeSet(){
  const w=liveState.workout, ex=w.exercises[liveState.exIdx];
  const tot=Number(ex.sets), nextSet=liveState.setIdx+1;
  const grp=getSupersetGroup(w, liveState.exIdx);
  const isSuperset=grp.end>grp.start;
  let doRest=false;
  if(isSuperset){
    if(liveState.exIdx<grp.end){
      liveState.pendingExAdvance={exIdx:liveState.exIdx+1, setIdx:liveState.setIdx};
      doRest=false;
    }else{
      if(nextSet>=tot){
        const afterGroup=grp.end+1;
        if(afterGroup>=w.exercises.length){liveState.done=true;saveWorkoutSession();checkWeightChanges();renderLive();return}
        liveState.pendingExAdvance={exIdx:afterGroup, setIdx:0};
      }else{liveState.pendingExAdvance={exIdx:grp.start, setIdx:nextSet};}
      doRest=true;
    }
  }else{
    if(nextSet>=tot){
      const nex=liveState.exIdx+1;
      if(nex>=w.exercises.length){liveState.done=true;saveWorkoutSession();checkWeightChanges();renderLive();return}
      liveState.pendingExAdvance={exIdx:nex, setIdx:0};
    }else{liveState.pendingExAdvance={exIdx:liveState.exIdx, setIdx:nextSet};}
    doRest=true;
  }
  w.exercises.forEach((e,i)=>{ e._inSuperset=false; });
  if(isSuperset){ for(let i=grp.start;i<=grp.end;i++) w.exercises[i]._inSuperset=true; }
  const rs=liveState.customRest!==null?liveState.customRest:Number(ex.rest);
  if(doRest && rs>0){
    liveState.phase="rest";liveState.timerLeft=rs;liveState.overtime=false;
    clearInterval(liveTimer);renderLive();
    liveTimer=setInterval(()=>{
      liveState.timerLeft--;
      if(liveState.timerLeft<0&&!liveState.overtime){
        liveState.overtime=true;applyPendingAdvance();renderLive();return;
      }
      const d=document.getElementById("rtimer");
      if(d)d.textContent=(liveState.overtime?"-":"")+fmt(Math.abs(liveState.timerLeft));
    },1000);
  }else{applyPendingAdvance();liveState.phase="work";renderLive();}
}
window.completeSet=completeSet;

function chgRest(v){
  clearInterval(liveTimer);const n=Number(v);
  liveState.customRest=n;liveState.timerLeft=n;
  const d=document.getElementById("rtimer");if(d)d.textContent=fmt(n);
  liveState.overtime=false;
  liveTimer=setInterval(()=>{
    liveState.timerLeft--;
    if(liveState.timerLeft<0&&!liveState.overtime){
      liveState.overtime=true;renderLive();return;
    }
    const dd=document.getElementById("rtimer");
    if(dd)dd.textContent=(liveState.overtime?"-":"")+fmt(Math.abs(liveState.timerLeft));
  },1000);
}
window.chgRest=chgRest;
function skipRest(){clearInterval(liveTimer);liveState.overtime=false;applyPendingAdvance();liveState.phase="work";renderLive()}
window.skipRest=skipRest;
function endLive(){clearInterval(liveTimer);releaseWakeLock();liveState=null;showScreen("main");showTab("program")}
window.endLive=endLive;

      <div onclick="document.getElementById('nutrition-date-picker').click()"

    </div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px">
        <div><div style="color:var(--muted);font-size:12px">Kcal consumate</div>
        <div style="color:${kc};font-size:34px;font-weight:900;line-height:1">${Math.round(tot.kcal)}</div></div>

        <div class="progress-fill" style="width:${kpct}%;background:${kc}"></div></div>

          style="font-size:20px;font-weight:700;text-align:center"

            <button onclick="selectMeal(${i})" id="meal-btn-${i}"
              style="padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:var(--sub);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s">
              ${m}
            </button>`).join("")}
        </div>
      </div>
      <button class="btn-primary" onclick="confirmFoodQtyModal()">✅ Aggiungi al diario</button>

function buildModalPreview(food,qty,absolute){
  // absolute=true: show food values directly without scaling (for recipes)
  const f=absolute?1:(qty/(window._modalBaseQty||100));
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
    [["🔥 Kcal",Math.round(food.kcal*f),""],
     ["💪 Proteine",r1(food.protein*f),"g"],
     ["🌾 Carboidrati",r1(food.carbs*f),"g"],
     ["🥑 Grassi",r1(food.fat*f),"g"]].map(function(x){
      return '<div style="background:var(--sub);border-radius:10px;padding:10px;text-align:center">'+
        '<div style="font-size:11px;color:var(--muted)">'+x[0]+'</div>'+
        '<div style="font-size:18px;font-weight:900;color:#fff">'+x[1]+x[2]+'</div></div>';
    }).join('')+'</div>';
}

async function confirmFoodQtyModal(){
  const food=window._modalFood||selectedFood;
  if(!food) return;
  const meal=MEAL_NAMES[_selectedMeal||0];
  const mainIngs=window._modalMainIngs||[];
  if(mainIngs.length>0){
    // Use pre-calculated values from updateRecipeMainQty
    await _addEntry({
      name:food.name,
      kcal:Math.round(food.kcal),
      protein:r1(food.protein),
      carbs:r1(food.carbs),
      fat:r1(food.fat),
      meal:meal
    });
  } else {
    const qty=Number((document.getElementById("fqm-qty")||{}).value)||1;
    const baseQty=window._modalBaseQty||100;
    const f=qty/baseQty;
    await _addEntry({
      name:food.name+" ("+qty+"g)",
      kcal:Math.round(food.kcal*f),
      protein:r1(food.protein*f),
      carbs:r1(food.carbs*f),
      fat:r1(food.fat*f),
      meal:meal
    });
  }
  window._modalMainIngs=null;
  window._modalRecipe=null;
  closeFoodQtyModalForce();
}

async function linkPartner(){
  const partnerEmail=(document.getElementById("link-partner-email").value||"").trim().toLowerCase();
  if(!partnerEmail){alert("Inserisci l'email del partner");return}
  if(partnerEmail===CU.email.toLowerCase()){alert("Non puoi collegare te stesso!");return}
  try{
    // Look up partner's coupleId via dedicated index doc (no full collection scan)
    let coupleId;
    const linkRef=doc(db,"coupleLinks",partnerEmail.replace("@","_").replace(".","_"));
    const linkSnap=await getDoc(linkRef);
    if(linkSnap.exists()&&linkSnap.data().coupleId){
      // Partner already created a coupleId - join it
      coupleId=linkSnap.data().coupleId;
    } else {
      // We're first - generate coupleId and register it
      coupleId=uid()+uid();
    }
    // Register our own email→coupleId mapping
    const myLinkRef=doc(db,"coupleLinks",CU.email.toLowerCase().replace("@","_").replace(".","_"));
    await setDoc(myLinkRef,{email:CU.email.toLowerCase(),coupleId,partnerEmail});
    // Update our profile
    profile.partnerEmail=partnerEmail;
    profile.coupleId=coupleId;
    window._coupleId=coupleId;
    await setDoc(doc(db,"users",CU.uid),profile,{merge:true});
    // Migrate existing data to coupleId
    await migrateDataToCoupleId(coupleId);
    toast("✓ Partner collegato! Ora condividete ricette e alimenti.");
    renderProfileTab();
  }catch(e){
    alert("Errore: "+e.message);
    console.error(e);
  }
}

// Automatically publish if local version is newer than Firestore
async function autoPublishIfNewer(){
  try{
    const snap=await getDoc(doc(db,"appMeta","version"));
    const serverVer=snap.exists()?snap.data().version:null;
    if(!serverVer||compareVersions(APP_VERSION,serverVer)>0){
      await publishAppVersion();
      console.log("Published new version:",APP_VERSION);
    }
  }catch(e){}
}

function compareVersions(a,b){
  const pa=a.split(".").map(Number);
  const pb=b.split(".").map(Number);
  for(let i=0;i<3;i++){
    const diff=(pa[i]||0)-(pb[i]||0);
    if(diff!==0) return diff;
  }
  return 0;
}

function formatNutritionDate(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  const today=todayStr();
  if(dateStr===today) return "Oggi · "+d.toLocaleDateString("it-IT",{weekday:"short",day:"2-digit",month:"short"});
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.toISOString().slice(0,10);
  if(dateStr===yStr) return "Ieri · "+d.toLocaleDateString("it-IT",{weekday:"short",day:"2-digit",month:"short"});
  return d.toLocaleDateString("it-IT",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
}

let _customFoods = [];  // loaded from Firestore

async function loadCustomFoods(){
  try{
    const cid=window._coupleId||CU.uid;
    const snap = await getDoc(doc(db,"customFoods",cid));
    _customFoods = snap.exists() ? (snap.data().foods||[]) : [];

    // Fallback: check legacy "shared" doc for foods added before couple system
    try{
      const legacySnap = await getDoc(doc(db,"customFoods","shared"));
      if(legacySnap.exists()){
        const legacyFoods = legacySnap.data().foods||[];
        if(legacyFoods.length>0){
          // Merge legacy foods not already present
          const existingNames=new Set(_customFoods.map(f=>f.name));
          const newOnes=legacyFoods.filter(f=>!existingNames.has(f.name));
          if(newOnes.length>0){
            _customFoods=[..._customFoods,...newOnes];
            // Save merged list to current coupleId doc
            await setDoc(doc(db,"customFoods",cid),{foods:_customFoods,coupleId:cid});
            console.log("Migrated",newOnes.length,"foods from legacy 'shared' doc");
          }
        }
      }
    }catch(e){ console.warn("legacy customFoods check:",e); }

  }catch(e){ _customFoods = []; console.error("loadCustomFoods:",e); }
  return _customFoods;
}

async function saveCustomFoods(){
  const cid=window._coupleId||CU.uid;
  await setDoc(doc(db,"customFoods",cid),{foods:_customFoods,coupleId:cid});

        <div style="font-size:36px;font-weight:900;color:var(--accent2)">${e.weight} <span style="font-size:16px;color:var(--muted)">kg</span></div>
        <div style="text-align:right;color:var(--muted);font-size:12px">Registrato il<br>${new Date(e.date).toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"})}</div>
      </div>
      <p style="color:#555;font-size:12px;margin-top:8px">Registra altri pesi nel Profilo per vedere il grafico.</p>
    </div>`;
  }
  const weights=entries.map(e=>e.weight);
  const minW=Math.min(...weights), maxW=Math.max(...weights);
  const range=maxW-minW||1;
  const W=300,H=90,padL=34,padB=22,padT=10,padR=10;
  const chartW=W-padL-padR, chartH=H-padB-padT;
  const n=entries.length;
  const pts=entries.map((e,i)=>({
    x:padL+(n===1?chartW/2:i/(n-1)*chartW),
    y:padT+chartH-(e.weight-minW)/range*chartH,
    w:e.weight,
    date:new Date(e.date).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"})
  }));
  const linePath=pts.map((p,i)=>(i===0?"M":"L")+p.x+","+p.y).join(" ");
  const fillPath=linePath+" L"+pts[pts.length-1].x+","+(padT+chartH)+" L"+pts[0].x+","+(padT+chartH)+" Z";
  const first=weights[0],last=weights[weights.length-1];
  const diff=Math.round((last-first)*10)/10;
  const trendColor=diff<0?"var(--green)":diff>0?"var(--red)":"var(--muted)";
  const trendIcon=diff<0?"↓":diff>0?"↑":"→";
  const yLabels=[minW,Math.round((minW+maxW)/2*10)/10,maxW];
  return `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-weight:700;font-size:14px;color:#fff">⚖️ Andamento peso</div>
        <div style="font-size:12px;color:var(--muted)">${n} misurazioni · Min: ${minW}kg · Max: ${maxW}kg</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:900;color:${trendColor}">${trendIcon} ${diff!==0?(diff>0?"+":"")+diff+"kg":"stabile"}</div>
        <div style="font-size:11px;color:var(--muted)">${pts[0].date} → ${pts[pts.length-1].date}</div>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      ${[0,0.5,1].map(t=>"<line x1='"+padL+"' y1='"+(padT+chartH-t*chartH)+"' x2='"+(W-padR)+"' y2='"+(padT+chartH-t*chartH)+"' stroke='#2a2a3e' stroke-width='1'/>").join("")}
      ${yLabels.map((v,i)=>"<text x='"+(padL-4)+"' y='"+(padT+chartH-[0,0.5,1][i]*chartH+4)+"' text-anchor='end' fill='#555' font-size='9'>"+v+"</text>").join("")}
      <path d="${fillPath}" fill="rgba(96,165,250,0.08)"/>
      <path d="${linePath}" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map(p=>"<circle cx='"+p.x+"' cy='"+p.y+"' r='4' fill='var(--accent2)' stroke='var(--bg)' stroke-width='2'/>").join("")}
      ${pts.filter((_,i)=>n<=4||i===0||i===n-1||i===Math.floor(n/2)).map(p=>"<text x='"+p.x+"' y='"+(H-2)+"' text-anchor='middle' fill='#555' font-size='8'>"+p.date+"</text>").join("")}
    </svg>
  </div>`;
}

function getTodayDayIdx(){
  // JS: 0=Sun,1=Mon...6=Sat → convert to Mon=0...Sun=6
  const d=new Date().getDay();
  return d===0?6:d-1;
}

  try{

    return snap.exists()?snap.data().week:[null,null,null,null,null,null,null];

function checkWeightChanges(){

  const keys=Object.keys(changes);
  if(keys.length===0) return;
  // Store pending changes for the done screen to pick up
  liveState.pendingWeightUpdate=changes;
}

async function updateWorkoutWeights(){
  const changes=liveState.pendingWeightUpdate||{};
  const keys=Object.keys(changes);
  if(keys.length===0) return;
  // Find the original workout doc
  const wktId=liveState.workout.id;
  const wkt=workouts.find(w=>w.id===wktId);
  if(!wkt) return;
  const updated=JSON.parse(JSON.stringify(wkt));
  keys.forEach(idx=>{
    if(updated.exercises[idx]) updated.exercises[idx].weight=changes[idx].newWeight;
  });
  await saveWktToDB(updated);
  toast("✓ Pesi aggiornati nella scheda!");
}

  const q=query(collection(db,"sessions"),where("uid","==",CU.uid));
  const snap=await getDocs(q);
  const sessions=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Body weight chart - always show if data exists
  const bwE=await loadBodyWeights();
  if(bwE.length>=1){
    const bwHtml=await buildBWChartHtml(bwE);
    el.innerHTML+=bwHtml;
  }

  if(!sessions.length){
    if(bwE.length<2) el.innerHTML+=`<p class="empty" style="margin-top:20px">Completa almeno un allenamento e registra il peso corporeo nel profilo per vedere la progressione.</p>`;
    return;
  }

  // Build exercise→weights map
  const exMap={};
  sessions.forEach(s=>{
    const dateStr=new Date(s.date).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"});
    (s.exercises||[]).forEach(ex=>{
      if(!ex.weight||ex.weight==="") return;
      const w=Number(ex.weight);
      if(!w) return;
      if(!exMap[ex.name]) exMap[ex.name]=[];
      exMap[ex.name].push({date:dateStr,weight:w,fullDate:s.date});
    });
  });

  const exNames=Object.keys(exMap).filter(n=>exMap[n].length>=1);
  if(!exNames.length){
    el.innerHTML+=`<div class="card" style="text-align:center;padding:24px;margin-top:12px"><p style="color:#555">Nessun peso registrato negli allenamenti.</p><p style="color:#555;font-size:12px;margin-top:6px">Inserisci i kg durante il live per vedere la progressione.</p></div>`;
    return;
  }

  let chartsHtml=`<div style="margin-top:4px">`;

  exNames.forEach(name=>{
    const pts=exMap[name];
    if(pts.length<1) return;
    const weights=pts.map(p=>p.weight);
    const minW=Math.min(...weights);
    const maxW=Math.max(...weights);
    const range=maxW-minW||1;
    const W=300, H=80, padL=32, padB=20, padT=10, padR=10;
    const chartW=W-padL-padR, chartH=H-padB-padT;
    const n=pts.length;

    // SVG points
    const svgPts=pts.map((p,i)=>{
      const x=padL+(n===1?chartW/2:i/(n-1)*chartW);
      const y=padT+chartH-(p.weight-minW)/range*chartH;
      return {x,y,w:p.weight,date:p.date};
    });

    // Line path
    const linePath=svgPts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
    // Fill path
    const fillPath=linePath+` L${svgPts[svgPts.length-1].x},${padT+chartH} L${svgPts[0].x},${padT+chartH} Z`;

    // Y axis labels
    const yLabels=[minW, Math.round((minW+maxW)/2), maxW];

    // Trend
    const first=weights[0], last=weights[weights.length-1];
    const diff=last-first;
    const trendColor=diff>0?"var(--green)":diff<0?"var(--red)":"var(--muted)";
    const trendIcon=diff>0?"↑":diff<0?"↓":"→";
    const trendStr=diff!==0?(diff>0?"+":"")+diff.toFixed(1)+"kg":"stabile";

    chartsHtml+=`
    <div class="card" style="margin-bottom:12px;padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:14px;color:#fff">${esc(name)}</div>
          <div style="font-size:12px;color:var(--muted)">${n} sessioni · Max: ${maxW}kg</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:900;color:${trendColor}">${trendIcon} ${trendStr}</div>
          <div style="font-size:11px;color:var(--muted)">${pts[0].date} → ${pts[pts.length-1].date}</div>
        </div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
        <!-- Grid lines -->
        ${[0,0.5,1].map(t=>{
          const y=padT+chartH-t*chartH;
          return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2a2a3e" stroke-width="1"/>`;
        }).join("")}
        <!-- Y labels -->
        ${yLabels.map((v,i)=>{
          const y=padT+chartH-[0,0.5,1][i]*chartH;
          return `<text x="${padL-4}" y="${y+4}" text-anchor="end" fill="#555" font-size="9">${v}</text>`;
        }).join("")}
        <!-- Fill area -->
        <path d="${fillPath}" fill="rgba(232,255,71,0.06)"/>
        <!-- Line -->
        <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <!-- Points -->
        ${svgPts.map(p=>`
          <circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>
        `).join("")}
        <!-- X labels (date) - show max 4 -->
        ${svgPts.filter((_,i)=>n<=4||i===0||i===n-1||i===Math.floor(n/2)).map(p=>`
          <text x="${p.x}" y="${H-2}" text-anchor="middle" fill="#555" font-size="8">${p.date}</text>
        `).join("")}
      </svg>
    </div>`;
  });

  chartsHtml+="</div>";
  el.innerHTML+=chartsHtml;
}

async function getFirestoreUsage(){
  let count=1;
  try{
    const [wSnap,sSnap]=await withTimeout(Promise.all([
      getDocs(query(collection(db,"workouts"),where("uid","==",CU.uid))),
      getDocs(query(collection(db,"sessions"),where("uid","==",CU.uid))),
    ]));
    // diary docs: hard to count without extra query, estimate from sessions
    count += wSnap.size + sSnap.size;
    // Spark plan: 1GB storage, ~each doc ~1KB average
    // Free reads: 50k/day, writes: 20k/day
    return {workouts:wSnap.size, sessions:sSnap.size, totalDocs:count};
  }catch(e){return {workouts:0,sessions:0,totalDocs:count}}
}

function calcBMI(weight,height){
  if(!weight||!height)return null;
  return weight/((height/100)**2);
}
function bmiCategory(bmi){
  if(bmi<18.5)return{label:"Sottopeso",color:"var(--accent2)"};
  if(bmi<25)return{label:"Normopeso ✅",color:"var(--green)"};
  if(bmi<30)return{label:"Sovrappeso",color:"var(--orange)"};
  return{label:"Obesità",color:"var(--red)"};
}
function calcIdealWeight(height){
  if(!height)return null;
  // Range basato su BMI 21-23 (più corretto clinicamente)
  const h=height/100;
  const min=Math.round(21*h*h*10)/10;
  const max=Math.round(23*h*h*10)/10;
  return {min,max};
}
function calcTDEE(weight,height,age,gender,activity){
  if(!weight||!height||!age)return null;
  // Harris-Benedict
  let bmr=gender==="F"
    ? 447.6+(9.25*weight)+(3.1*height)-(4.33*age)
    : 88.36+(13.4*weight)+(4.8*height)-(5.68*age);
  const actMap={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9};
  return Math.round(bmr*(actMap[activity]||1.55));
}
function calcMacros(tdee,goal,weight){
  // 1. Proteine: moltiplicatore varia per obiettivo
  const proteinMult={bulk:1.6,cut:1.4,maintain:1.2,recomp:1.5};
  const protein=Math.round((proteinMult[goal]||1.4)*weight);
  const proteinKcal=protein*4;
  // 2. Kcal rimanenti dopo le proteine
  const remaining=tdee-proteinKcal;
  // 3. Grassi: 25% delle kcal rimanenti → / 9 kcal/g
  const fatKcal=Math.round(remaining*0.25);
  const fat=Math.round(fatKcal/9);
  // 4. Carbo: il restante → / 4 kcal/g
  const carbsKcal=remaining-fatKcal;
  const carbs=Math.round(carbsKcal/4);
  return {protein,carbs,fat,totalKcal:tdee};
}

function renderRecipeIngredients(){
  const el=document.getElementById("rec-ingredients");
  if(!el) return;

    const dbFood=ing.foodIdx>=0?FOOD_DB[ing.foodIdx]:null;

          oninput="searchRecipeFood(${i},this.value)" onfocus="showRecipeFoodResults(${i})"
          style="width:100%;background:var(--sub);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:13px;font-family:inherit;outline:none">
        <div id="rfood-res-${i}" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;z-index:50;max-height:180px;overflow-y:auto;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.5)"></div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><label class="form-label">g / ml</label>
          <input type="number" value="${ing.qty}" min="1" oninput="setRecipeQty(${i},this.value)"
            style="border-radius:10px;padding:10px;font-size:13px"></div>

          <label class="form-label" style="margin:0">Princ.</label>

            style="width:36px;height:36px;border-radius:8px;border:2px solid ${ing.isMain===true?"#e8ff47":"var(--border)"};background:${ing.isMain===true?"#e8ff47":"var(--sub)"};color:${ing.isMain===true?"#0a0a14":"#555"};font-size:16px;cursor:pointer;transition:all .15s">
            ⭐
          </button>
        </div>
        ${ingLine?'<div style="background:var(--sub);border-radius:10px;padding:8px;font-size:11px;color:var(--muted);flex:1;display:flex;align-items:center">'+ingLine+'</div>':""}
      </div>
    </div>`}).join("");
  updateRecipeTotals();
}

function calcIngLine(ing){
  if(ing.foodIdx>=0){
    const f=FOOD_DB[ing.foodIdx]; if(!f) return "";
    const r=ing.qty/100;
    return Math.round(f.kcal*r)+" kcal · P "+Math.round(f.protein*r*10)/10+"g · C "+Math.round(f.carbs*r*10)/10+"g · G "+Math.round(f.fat*r*10)/10+"g";
  } else if(ing.manualName&&(ing.manualKcal||ing.manualKcal===0)){
    const r=ing.qty/100;
    return Math.round((ing.manualKcal||0)*r)+" kcal · P "+Math.round((ing.manualProtein||0)*r*10)/10+"g · C "+Math.round((ing.manualCarbs||0)*r*10)/10+"g · G "+Math.round((ing.manualFat||0)*r*10)/10+"g";
  }
  return "";
}

function setRecipeFood(i,val){window._recipeIngredients[i].foodIdx=Number(val);renderRecipeIngredients()}
window.setRecipeFood=setRecipeFood;

function searchRecipeFood(i,q){
  const res=document.getElementById("rfood-res-"+i);
  if(!res) return;
  if(!q.trim()){
    // Show all if empty
    const all=getAllFoods().slice(0,10);
    renderRFoodResults(i,all,res);
    return;
  }
  const matches=getAllFoods().filter(f=>f.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  // If no exact match, offer manual entry
  renderRFoodResults(i,matches,res,q);
}

function showRecipeFoodResults(i){
  const inp=document.getElementById("rfood-inp-"+i);
  const q=inp?inp.value:"";
  // Always show results on focus, even if empty
  const res=document.getElementById("rfood-res-"+i);
  if(res) res.style.display="block";
  searchRecipeFood(i,q);
}
window.showRecipeFoodResults=showRecipeFoodResults;

function renderRFoodResults(i,matches,res,q){
  res.style.display="block";
  let html=matches.map((f,fi)=>{
    const safeName=f.name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    return '<div onclick="selectRFoodByName('+i+',\''+safeName+'\')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;color:#fff">'+
      '<div style="font-weight:600">'+esc(f.name)+'</div>'+
      '<div style="font-size:11px;color:var(--muted)">'+f.kcal+' kcal · P '+f.protein+'g · C '+f.carbs+'g · G '+f.fat+'g per '+f.unit+'</div>'+
    '</div>';
  }).join("");
  if(q&&!matches.find(f=>f.name.toLowerCase()===q.toLowerCase())){
    html+=`<div onclick="setRFoodManual(${i},'${q.replace(/'/g,"\'")}',this)" style="padding:10px 14px;cursor:pointer;font-size:13px;color:var(--accent);border-top:1px solid var(--border)">
      ✏️ Inserisci "${q}" manualmente
    </div>`;
  }
  if(!html) html='<div style="padding:10px 14px;color:var(--muted);font-size:13px">Nessun risultato</div>';
  res.innerHTML=html;
}

function selectRFood(i,foodIdx){

  const food=allF[foodIdx];
  if(food) selectRFoodByName(i,food.name);

function selectRFoodByName(i,name){
  const food=getAllFoods().find(f=>f.name===name);
  if(!food){ console.warn("Food not found:",name); return; }
  const dbIdx=FOOD_DB.findIndex(f=>f.name===food.name);
  if(dbIdx>=0){
    window._recipeIngredients[i].foodIdx=dbIdx;
    window._recipeIngredients[i].manualName=null;
    window._recipeIngredients[i].manualKcal=null;
  } else {
    window._recipeIngredients[i].foodIdx=-1;
    window._recipeIngredients[i].manualName=food.name;
    window._recipeIngredients[i].manualKcal=food.kcal;
    window._recipeIngredients[i].manualProtein=food.protein;
    window._recipeIngredients[i].manualCarbs=food.carbs;
    window._recipeIngredients[i].manualFat=food.fat;
  }
  const res=document.getElementById("rfood-res-"+i);
  if(res) res.style.display="none";
  const inp=document.getElementById("rfood-inp-"+i);
  if(inp) inp.value=food.name;
  renderRecipeIngredients();
}

function toggleMainIng(i){

  const btn=document.getElementById("main-btn-"+i);
  if(btn){
    const isMain=window._recipeIngredients[i].isMain;

window.toggleMainIng=toggleMainIng;

function updateRecipeMainQty(){
  const mainIngs=window._modalMainIngs||[];
  if(!mainIngs.length) return;
  const r=window._modalRecipe;
  if(!r) return;
  const allIngs=r.ingredients||[];

  // 1. Fixed contribution from NON-main ingredients
  let tot={kcal:0,protein:0,carbs:0,fat:0};
  allIngs.filter(ing=>!ing.isMain).forEach(ing=>{
    const food=getAllFoods().find(f=>f.name===ing.foodName);
    if(food){
      const f=(ing.qty||100)/100;
      tot.kcal+=food.kcal*f;
      tot.protein+=food.protein*f;
      tot.carbs+=food.carbs*f;
      tot.fat+=food.fat*f;
    }
  });

  // 2. Variable contribution from MAIN ingredients (based on user input)
  mainIngs.forEach((ing,mi)=>{
    const inp=document.getElementById("main-qty-"+mi);
    const qty=inp?Number(inp.value)||0:ing.qty;
    const food=getAllFoods().find(f=>f.name===ing.foodName);
    if(food){
      const f=qty/100;
      tot.kcal+=food.kcal*f;
      tot.protein+=food.protein*f;
      tot.carbs+=food.carbs*f;
      tot.fat+=food.fat*f;
    }
  });

  const prev=document.getElementById("fqm-preview");
  if(prev) prev.innerHTML=buildModalPreview({kcal:tot.kcal,protein:tot.protein,carbs:tot.carbs,fat:tot.fat},1,true);
  window._modalFood={...window._modalFood,kcal:tot.kcal,protein:tot.protein,carbs:tot.carbs,fat:tot.fat};
  window._modalBaseQty=1;
}
window.updateRecipeMainQty=updateRecipeMainQty;
function rmRecipeIng(i){window._recipeIngredients.splice(i,1);renderRecipeIngredients()}
window.rmRecipeIng=rmRecipeIng;

function updateRecipeTotals(){
  const ings=window._recipeIngredients.filter(i=>i.foodIdx>=0||(i.manualName&&i.manualName.trim()));
  if(!ings.length){document.getElementById("rec-totals").style.display="none";return}
  const tot=ings.reduce((a,ing)=>{
    const r=ing.qty/100;
    if(ing.foodIdx>=0){
      const f=FOOD_DB[ing.foodIdx];
      return {kcal:a.kcal+f.kcal*r,protein:a.protein+f.protein*r,carbs:a.carbs+f.carbs*r,fat:a.fat+f.fat*r};
    } else if(ing.manualName){
      // Could be a custom food with values stored directly
      const kcal=ing.manualKcal||0;
      const pro=ing.manualProtein||0;
      const car=ing.manualCarbs||0;
      const fat=ing.manualFat||0;
      return {kcal:a.kcal+kcal*r,protein:a.protein+pro*r,carbs:a.carbs+car*r,fat:a.fat+fat*r};
    }
    return a;
  },{kcal:0,protein:0,carbs:0,fat:0});
  const portions=Number(document.getElementById("rec-portions")?.value)||1;
  document.getElementById("rec-totals").style.display="block";
  document.getElementById("rec-totals-content").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      ${[["🔥 Totale",Math.round(tot.kcal),"kcal"],["💪 Proteine",Math.round(tot.protein*10)/10,"g"],["🌾 Carbo",Math.round(tot.carbs*10)/10,"g"],["🥑 Grassi",Math.round(tot.fat*10)/10,"g"]].map(([l,v,u])=>`
        <div style="background:var(--sub);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">${l}</div>
          <div style="font-weight:800;color:#fff">${v}${u}</div>
        </div>`).join("")}
    </div>
    ${portions>1?('<div style="font-size:12px;color:var(--muted);text-align:center">Per porzione: '+Math.round(tot.kcal/portions)+' kcal · P '+Math.round(tot.protein/portions*10)/10+'g · C '+Math.round(tot.carbs/portions*10)/10+'g · G '+Math.round(tot.fat/portions*10)/10+'g</div>'):""}`;
  window._currentRecipeTotals=tot;
}
window.updateRecipeTotals=updateRecipeTotals;

async function saveRecipe(){
  const name=document.getElementById("rec-name").value.trim();
  if(!name){alert("Dai un nome alla ricetta!");return}
  const ings=window._recipeIngredients.filter(i=>i.foodIdx>=0||(i.manualName&&i.manualName.trim()));
  if(!ings.length){alert("Aggiungi almeno un ingrediente!");return}
  const portions=Number(document.getElementById("rec-portions").value)||1;
  const tot=window._currentRecipeTotals||{kcal:0,protein:0,carbs:0,fat:0};
  const recipe={
    name, portions,
    createdBy:profile.name||CU.email,
    coupleId:window._coupleId||CU.uid,
    updatedAt:new Date().toISOString(),
    ingredients:ings.map(i=>i.foodIdx>=0
      ?{foodName:FOOD_DB[i.foodIdx].name,qty:i.qty,isMain:i.isMain||false}
      :{foodName:i.manualName,qty:i.qty,isMain:i.isMain||false,manual:true,kcal:i.manualKcal,protein:i.manualProtein,carbs:i.manualCarbs,fat:i.manualFat}),
    totals:{kcal:Math.round(tot.kcal),protein:Math.round(tot.protein*10)/10,carbs:Math.round(tot.carbs*10)/10,fat:Math.round(tot.fat*10)/10}
  };
  const editId=window._editingRecipeId||null;
  if(editId){
    recipe.createdAt=(window._sharedRecipes.find(r=>r.id===editId)||{}).createdAt||new Date().toISOString();
    await setDoc(doc(db,"recipes",editId),recipe);
    toast("✓ Ricetta aggiornata!");
  } else {
    recipe.createdAt=new Date().toISOString();
    await addDoc(collection(db,"recipes"),recipe);
    toast("✓ Ricetta salvata e condivisa!");
  }
  window._editingRecipeId=null;
  openFoodAdd();
}
window.saveRecipe=saveRecipe;;

function addRecipeToDiary(id){
  const r=window._sharedRecipes.find(x=>x.id===id);
  if(!r) return;
  // Open qty modal with recipe totals
  // totalWeight = sum of all ingredient quantities
  const totalWeight=r.ingredients
    ? r.ingredients.reduce((s,i)=>s+(i.qty||100),0)
    : 100;
  const mainIngs=(r.ingredients||[]).filter(i=>i.isMain);
  // If main ingredients exist, calculate their sub-totals for scaling
  let mainTotals=null;
  if(mainIngs.length>0){
    mainTotals={kcal:0,protein:0,carbs:0,fat:0,weight:0};
    mainIngs.forEach(ing=>{
      const f=FOOD_DB.find(x=>x.name===ing.foodName)||_customFoods.find(x=>x.name===ing.foodName);
      if(f){
        const r2=(ing.qty||100)/100;
        mainTotals.kcal+=f.kcal*r2;
        mainTotals.protein+=f.protein*r2;
        mainTotals.carbs+=f.carbs*r2;
        mainTotals.fat+=f.fat*r2;
      }
      mainTotals.weight+=(ing.qty||100);
    });
  }
  // Food to show in modal: use main totals if available, else full recipe
  // Always start with full recipe totals
  const displayBase=mainTotals?mainTotals.weight:totalWeight;
  const recipeFood={
    name:r.name,
    kcal:r.totals.kcal,
    protein:r.totals.protein,
    carbs:r.totals.carbs,
    fat:r.totals.fat,
    unit:"ricetta completa "+totalWeight+"g",
    _recipeId:id,
    _recipeWeight:totalWeight
  };
  // Set base to totalWeight so scaling works correctly
  window._modalFood=recipeFood;
  window._modalBaseQty=totalWeight; // use totalWeight so initial f=1
  window._modalMainIngs=mainIngs;
  window._modalRecipe=r;
  // Will call updateRecipeMainQty after modal opens
  const modal=document.getElementById("food-qty-modal");
  const previewHtml=buildModalPreview({kcal:r.totals.kcal,protein:r.totals.protein,carbs:r.totals.carbs,fat:r.totals.fat},totalWeight,true);
  modal.querySelector(".modal-inner").innerHTML=`
    <div class="modal-header">
      <span class="modal-title">🍽️ ${esc(r.name)}</span>
      <button class="modal-close" onclick="closeFoodQtyModalForce()">✕</button>
    </div>
    <div class="modal-scroll">
      <p style="color:var(--muted);font-size:12px;margin-bottom:8px">Ricetta completa: ${totalWeight}g · ${Math.round(r.totals.kcal)} kcal</p>
      ${mainIngs.length>0?`
      <div style="background:var(--sub);border-radius:12px;padding:12px;margin-bottom:14px">
        <p style="color:var(--accent);font-size:12px;font-weight:700;margin-bottom:10px">⭐ Modifica grammature principali</p>
        ${mainIngs.map((ing,mi)=>`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="flex:1;font-size:13px;color:#fff">${esc(ing.foodName)}</span>
            <input type="number" id="main-qty-${mi}" value="${ing.qty}" min="1"
              oninput="updateRecipeMainQty()"
              style="width:80px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--accent);font-size:14px;font-weight:700;font-family:inherit;outline:none;text-align:center">
            <span style="color:var(--muted);font-size:12px">g</span>
          </div>`).join("")}
      </div>
      <div id="fqm-preview" style="margin-bottom:14px">${previewHtml}</div>`
      :`<div class="form-group">
        <label class="form-label">Grammatura (g)</label>
        <input type="number" id="fqm-qty" value="${totalWeight}" min="1"
          style="font-size:20px;font-weight:700;text-align:center"
          oninput="updateFoodQtyModal()">
      </div>
      <div id="fqm-preview" style="margin-bottom:16px">${previewHtml}</div>`}
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">Pasto</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          ${ ["🌅 Colazione","🍎 Spuntino","☀️ Pranzo","🍊 Merenda","🌙 Cena"].map((m,i)=>
            '<button onclick="selectMeal('+i+')" id="meal-btn-'+i+'" style="padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:var(--sub);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit">'+m+'</button>'
          ).join("") }
        </div>
      </div>
      <button class="btn-primary" onclick="confirmFoodQtyModal()">✅ Aggiungi al diario</button>
    </div>`;
  modal.style.display="flex";
  // Recalculate with default main ingredient quantities after DOM is ready
  if(mainIngs.length>0){
    setTimeout(()=>updateRecipeMainQty(), 50);
  }
}
window.addRecipeToDiary=addRecipeToDiary;

async function editRecipe(id){
  const r=window._sharedRecipes.find(x=>x.id===id);
  if(!r) return;
  await loadCustomFoods();
  const el=document.getElementById("tab-nutrition");
  window._editingRecipeId=id;
  window._recipeIngredients=(r.ingredients||[]).map(ing=>{
    const dbIdx=FOOD_DB.findIndex(f=>f.name===ing.foodName);
    if(dbIdx>=0) return {foodIdx:dbIdx,qty:ing.qty,isMain:ing.isMain===true,manualName:null};
    const cf=_customFoods.find(f=>f.name===ing.foodName);
    if(cf) return {foodIdx:-1,qty:ing.qty,isMain:ing.isMain===true,manualName:cf.name,
      manualKcal:cf.kcal,manualProtein:cf.protein,manualCarbs:cf.carbs,manualFat:cf.fat};
    return {foodIdx:-1,qty:ing.qty,isMain:ing.isMain===true,manualName:ing.foodName,
      manualKcal:ing.kcal||0,manualProtein:ing.protein||0,
      manualCarbs:ing.carbs||0,manualFat:ing.fat||0};
  });
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <button class="btn-back" onclick="openFoodAdd()">← Indietro</button>
      <h2 class="section-title" style="margin:0">Modifica ricetta</h2>
    </div>
    <div class="form-group"><label class="form-label">Nome ricetta</label>
      <input type="text" id="rec-name" value="${esc(r.name)}" placeholder="Es. Pasta al tonno…"></div>
    <div class="form-group"><label class="form-label">Porzioni</label>
      <input type="number" id="rec-portions" value="${r.portions||1}" min="1"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="color:var(--accent);font-weight:700;font-size:14px">Ingredienti</span>
      <button class="btn-add" onclick="addRecipeIngredient()">+ Aggiungi</button>
    </div>
    <div id="rec-ingredients"></div>
    <div id="rec-totals" class="card" style="margin-bottom:12px;display:none">
      <div style="color:var(--accent);font-weight:700;margin-bottom:8px">📊 Totali ricetta</div>
      <div id="rec-totals-content"></div>
    </div>
    <button class="btn-primary" onclick="saveRecipe()">💾 Salva modifiche</button>`;
  renderRecipeIngredients();
  updateRecipeTotals();
}
window.editRecipe=editRecipe;

async function deleteRecipe(id){
  if(!confirm("Eliminare questa ricetta?")) return;
  await deleteDoc(doc(db,"recipes",id));
  window._sharedRecipes=window._sharedRecipes.filter(r=>r.id!==id);
  renderRecipesList();
  toast("🗑 Ricetta eliminata");
}
window.deleteRecipe=deleteRecipe;
</script>
</body>
</html>
